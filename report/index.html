<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AI 성장리포트 — FILLYO</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root{
  --navy:#0B1F3A; --blue:#1e3a5f; --sky:#E8F1FF; --sky2:#C8DCFF;
  --teal:#0A7C6E; --teal-lt:#E4F5F3;
  --red:#C62828; --red-lt:#FFEBEE;
  --orange:#E65100; --orange-lt:#FFF3E0;
  --yellow:#F9A825;
  --gray:#546E7A; --border:#e5e7eb; --bg:#f3f4f6;
  --text:#1A2332; --text2:#4A5A6A;
  --shadow:0 2px 10px rgba(11,31,58,.10);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;}

/* ── Loading ── */
#loadingScreen{position:fixed;inset:0;background:#0B1F3A;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;}
.ld-logo{font-size:28px;font-weight:900;color:#0B7B6B;letter-spacing:-1px;animation:ldpulse 1.4s ease-in-out infinite;}
@keyframes ldpulse{0%,100%{opacity:1}50%{opacity:.35}}
.ld-msg{color:rgba(255,255,255,.4);font-size:12px;margin-top:10px;}

/* ── Header ── */
.hdr{background:#1e3a5f;position:sticky;top:0;z-index:200;display:flex;align-items:center;gap:10px;padding:0 16px;height:56px;box-shadow:0 2px 8px rgba(0,0,0,0.2);}
.fillyo-icon{background:#0B7B6B;border-radius:8px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:900;line-height:1.2;text-align:center;color:white;flex-shrink:0;cursor:pointer;font-family:inherit;border:none;}
.hdr-title{color:white;font-size:15px;font-weight:900;letter-spacing:-.5px;flex:1;text-align:center;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
.hdr-title span{color:var(--yellow);}
.hdr-btns{display:flex;gap:6px;margin-left:auto;}
.hdr-btn{background:rgba(255,255,255,0.15);border:1.5px solid rgba(255,255,255,0.4);color:white;font-size:13px;cursor:pointer;padding:5px 10px;border-radius:8px;font-weight:700;font-family:inherit;white-space:nowrap;}
.hdr-btn:active{background:rgba(255,255,255,0.28);}

/* ── Layout ── */
#app{display:none;flex-direction:column;}
.layout{display:flex;height:calc(100vh - 56px);overflow:hidden;}

/* ── Sidebar ── */
.sidebar{width:220px;flex-shrink:0;background:#ffffff;border-right:1px solid #e5e7eb;display:flex;flex-direction:column;overflow:hidden;}
.sidebar-hd{padding:12px 14px;font-size:12px;font-weight:600;color:#1e3a5f;border-bottom:1px solid #e5e7eb;background:#f9fafb;}
.student-list{flex:1;overflow-y:auto;}
.s-item{display:flex;align-items:center;gap:9px;padding:10px 12px;cursor:pointer;border-bottom:1px solid #f0f4f8;transition:.12s;}
.s-item:hover{background:#f0f4ff;}
.s-item.active{background:#1e3a5f;color:white;}
.s-item.active .s-name{color:white;}
.s-name{font-size:13px;font-weight:700;flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;color:var(--text);}
.belt-pill{display:inline-block;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:700;white-space:nowrap;}

/* ── Panel ── */
.panel{flex:1;overflow-y:auto;display:flex;flex-direction:column;}
.empty-msg{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--gray);gap:8px;}
.empty-msg .em-icon{font-size:40px;opacity:.4;}
.empty-msg p{font-size:14px;opacity:.6;}

/* ── Student header in panel ── */
.stu-hd{padding:14px 16px 0;display:flex;align-items:center;gap:10px;}
.stu-hd-name{font-size:18px;font-weight:900;letter-spacing:-.5px;}

/* ── Tabs ── */
.tabs{display:flex;gap:0;padding:12px 16px 0;border-bottom:2px solid var(--border);margin-bottom:0;}
.tab-btn{flex:1;padding:9px 6px;background:none;border:none;font-family:inherit;font-size:13px;font-weight:700;color:#6b7280;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:.15s;}
.tab-btn.active{color:#1e3a5f;border-bottom-color:#1e3a5f;}
.tab-content{display:none;padding:14px 16px;flex:1;}
.tab-content.active{display:block;}

/* ── Body Records ── */
.body-form{display:flex;flex-wrap:wrap;gap:8px;padding:12px;background:var(--sky);border-radius:12px;margin-bottom:14px;}
.body-form label{font-size:11px;font-weight:700;color:var(--gray);display:block;margin-bottom:3px;}
.body-inp{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:8px;font-family:inherit;font-size:13px;color:var(--text);}
.body-inp:focus{outline:none;border-color:#1e3a5f;}
.bf-field{flex:1;min-width:80px;}
.bf-date{flex:1.5;min-width:110px;}
.btn-add{width:100%;padding:9px;background:#1e3a5f;color:white;border:none;border-radius:9px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;margin-top:4px;}
.btn-add:active{opacity:.85;}

.body-records{display:flex;flex-direction:column;gap:8px;}
.body-rec{background:white;border:1px solid var(--border);border-radius:10px;padding:10px 12px;display:flex;align-items:center;gap:10px;}
.rec-date{font-size:12px;color:var(--gray);min-width:80px;}
.rec-vals{flex:1;font-size:13px;font-weight:700;}
.rec-vals span{color:var(--gray);font-weight:400;font-size:12px;}
.btn-del{background:var(--red-lt);color:var(--red);border:none;border-radius:7px;padding:5px 9px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;flex-shrink:0;}
.btn-del:active{opacity:.75;}
.no-record{color:var(--gray);font-size:13px;text-align:center;padding:20px 0;opacity:.6;}

/* ── Traits ── */
.trait-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
.trait-item{display:flex;align-items:center;gap:8px;padding:10px 12px;background:white;border:1.5px solid var(--border);border-radius:10px;cursor:pointer;transition:.12s;}
.trait-item.checked{background:var(--sky);border-color:#1e3a5f;}
.trait-item input[type=checkbox]{width:16px;height:16px;accent-color:#1e3a5f;flex-shrink:0;}
.trait-label{font-size:13px;font-weight:600;}
.trait-save-msg{font-size:12px;color:var(--teal);text-align:center;margin-top:10px;min-height:18px;transition:.3s;}

/* ── Report Gen ── */
.rpt-row{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.rpt-month-inp{flex:1;padding:9px 12px;border:1px solid var(--border);border-radius:9px;font-family:inherit;font-size:14px;color:var(--text);}
.rpt-month-inp:focus{outline:none;border-color:#1e3a5f;}
.btn-gen{background:#1e3a5f;color:white;border:none;border-radius:9px;padding:9px 18px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;}
.btn-gen:disabled{opacity:.5;cursor:not-allowed;}
.btn-gen:not(:disabled):active{opacity:.85;}

.rpt-result-wrap{background:var(--sky);border:1px solid var(--sky2);border-radius:12px;padding:14px;position:relative;}
.rpt-result-title{font-size:11px;font-weight:700;color:#1e3a5f;margin-bottom:8px;}
.rpt-result{font-size:14px;line-height:1.75;color:var(--text);white-space:pre-wrap;word-break:break-all;}
.btn-copy{margin-top:10px;background:#1e3a5f;color:white;border:none;border-radius:8px;padding:8px 16px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;}
.btn-copy:active{opacity:.85;}
.rpt-status{font-size:12px;color:var(--gray);margin-bottom:10px;min-height:18px;}
.rpt-loading{display:flex;align-items:center;gap:8px;font-size:13px;color:#1e3a5f;}
.spinner{width:16px;height:16px;border:2px solid var(--sky2);border-top-color:#1e3a5f;border-radius:50%;animation:spin .6s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── API Key Modal ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal{background:white;border-radius:18px;padding:24px;max-width:360px;width:100%;}
.modal h3{font-size:17px;font-weight:900;margin-bottom:6px;}
.modal p{font-size:13px;color:var(--gray);line-height:1.6;margin-bottom:14px;}
.modal input{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:9px;font-family:inherit;font-size:13px;margin-bottom:12px;}
.modal input:focus{outline:none;border-color:#1e3a5f;}
.modal-btns{display:flex;gap:8px;}
.modal-btns button{flex:1;padding:10px;border:none;border-radius:9px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;}
.btn-cancel{background:var(--bg);color:var(--gray);}
.btn-save{background:#1e3a5f;color:white;}

/* ── Belt Badge ── */
.belt-wrap       { display:inline-flex; flex-direction:column; align-items:center; vertical-align:middle; flex-shrink:0; }
.belt-strip      { position:relative; display:inline-block; width:72px; height:20px; border-radius:4px; overflow:hidden; }
.belt-strip-text { position:relative; z-index:1; display:flex; align-items:center; justify-content:center; height:100%; font-size:11px; font-weight:700; white-space:nowrap; overflow:hidden; }
.belt-label      { font-size:11px; color:#374151; margin-top:3px; white-space:nowrap; font-weight:500; line-height:1.2; }
.belt-stripe     { position:absolute; left:0; right:0; pointer-events:none; }

/* ── Mobile ── */
@media(max-width:640px){
  .student-list{display:grid;grid-template-columns:repeat(2,1fr);max-height:200px;overflow-y:auto;}
  .s-item{border-bottom:1px solid #f0f4f8;border-right:1px solid #f0f4f8;}
  .trait-grid{grid-template-columns:repeat(2,1fr);}
}
@media (max-width: 768px) {
  .layout { flex-direction: column; }
  .sidebar { width: 100%; height: auto; border-right: none; border-bottom: 1px solid #e5e7eb; }
  .panel { display: none; }
  .sidebar.hidden { display: none; }
  .panel.mobile-show { display: flex !important; flex-direction: column; }
  .mobile-back-btn { display: flex !important; }
}
.mobile-back-btn { display: none; }
</style>
</head>
<body>

<!-- Loading -->
<div id="loadingScreen">
  <div class="ld-logo">FILLYO</div>
  <div class="ld-msg">성장 리포트 불러오는 중...</div>
</div>

<!-- App -->
<div id="app">
  <header class="hdr">
    <button class="fillyo-icon" onclick="location.href='/dashboard/'">FILLYO</button>
    <div class="hdr-title"><span id="academyName">학원명</span> · 성장 리포트</div>
    <div class="hdr-btns">
      <button class="hdr-btn" id="btnApiKey">🔑 API키</button>
      <button class="hdr-btn" id="btnLogout" onclick="doLogout()">로그아웃</button>
    </div>
  </header>

  <div class="layout">
    <!-- 좌측: 수련생 목록 -->
    <div class="sidebar">
      <div class="sidebar-hd">수련생 목록</div>
      <div style="padding:8px 12px;display:flex;flex-direction:column;gap:6px;border-bottom:1px solid #e5e7eb;">
        <input type="text" id="searchInput" placeholder="이름 검색..." oninput="filterStudents()"
          style="width:100%;box-sizing:border-box;padding:6px 10px;border:1px solid #d1d5db;border-radius:6px;font-size:13px;outline:none;">
        <select id="sortSelect" onchange="filterStudents()"
          style="width:100%;box-sizing:border-box;padding:6px 8px;border:1px solid #d1d5db;border-radius:6px;font-size:13px;background:white;outline:none;">
          <option value="name">이름순</option>
          <option value="belt-high">띠 높은순</option>
          <option value="belt-low">띠 낮은순</option>
          <option value="age">나이순</option>
        </select>
      </div>
      <div id="studentList" class="student-list">
        <div class="no-record" style="grid-column:1/-1">불러오는 중...</div>
      </div>
    </div>

    <!-- 우측: 상세 패널 -->
    <div class="panel" id="panel">
      <div class="empty-msg" id="emptyState">
        <div class="em-icon">📋</div>
        <p>좌측에서 수련생을 선택하세요</p>
      </div>

      <div id="detailPanel" style="display:none">
        <button class="mobile-back-btn" onclick="mobileBack()"
          style="margin:12px 16px 0;padding:6px 12px;background:#f3f4f6;border:1px solid #d1d5db;border-radius:6px;font-size:13px;cursor:pointer;align-items:center;gap:4px;width:fit-content;">
          ← 목록으로
        </button>
        <div class="stu-hd">
          <div id="selBeltBadge"></div>
          <div class="stu-hd-name" id="selName"></div>
        </div>

        <div class="tabs">
          <button class="tab-btn active" data-tab="body" onclick="switchTab('body',this)">성장기록</button>
          <button class="tab-btn" data-tab="traits" onclick="switchTab('traits',this)">성격태그</button>
          <button class="tab-btn" data-tab="report" onclick="switchTab('report',this)">리포트 생성</button>
        </div>

        <!-- Tab 1: 성장기록 -->
        <div class="tab-content active" id="tabBody">
          <div class="body-form">
            <div class="bf-date">
              <label>측정일</label>
              <input type="date" class="body-inp" id="fDate">
            </div>
            <div class="bf-field">
              <label>키 (cm)</label>
              <input type="number" class="body-inp" id="fHeight" placeholder="예: 142.5" step="0.1">
            </div>
            <div class="bf-field">
              <label>몸무게 (kg)</label>
              <input type="number" class="body-inp" id="fWeight" placeholder="예: 38.2" step="0.1">
            </div>
            <button class="btn-add" onclick="addBodyRecord()">+ 기록 추가</button>
          </div>
          <div id="bodyList" class="body-records"></div>
        </div>

        <!-- Tab 2: 성격태그 -->
        <div class="tab-content" id="tabTraits">
          <div id="traitGrid" style="padding:8px 0;"></div>
          <div class="trait-save-msg" id="traitMsg"></div>
        </div>

        <!-- Tab 3: 리포트 생성 -->
        <div class="tab-content" id="tabReport">
          <div style="margin-bottom:10px;">
            <div style="display:flex;align-items:flex-end;gap:8px;margin-bottom:10px;">
              <div style="flex:1;">
                <div style="font-size:11px;color:#6b7280;margin-bottom:4px;">시작월</div>
                <input type="month" class="rpt-month-inp" id="rptStart" style="width:100%;">
              </div>
              <div style="color:#9ca3af;font-size:16px;padding-bottom:9px;">~</div>
              <div style="flex:1;">
                <div style="font-size:11px;color:#6b7280;margin-bottom:4px;">종료월</div>
                <input type="month" class="rpt-month-inp" id="rptEnd" style="width:100%;">
              </div>
            </div>
            <button class="btn-gen" id="btnGenerate" onclick="generateReport()" style="width:100%;">리포트 생성</button>
          </div>
          <div id="dataSummary" style="display:none;margin-bottom:12px;">
            <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:8px;">
              <div style="background:#f0f4ff;border-radius:8px;padding:10px;text-align:center;">
                <div style="font-size:11px;color:#6b7280;margin-bottom:2px">출석</div>
                <div id="sumAttend" style="font-size:18px;font-weight:700;color:#1e3a5f">-</div>
              </div>
              <div style="background:#f0fdf4;border-radius:8px;padding:10px;text-align:center;">
                <div style="font-size:11px;color:#6b7280;margin-bottom:2px">심사결과</div>
                <div id="sumExam" style="font-size:14px;font-weight:700;color:#15803d">-</div>
              </div>
              <div style="background:#fff7ed;border-radius:8px;padding:10px;text-align:center;">
                <div style="font-size:11px;color:#6b7280;margin-bottom:2px">줄넘기</div>
                <div id="sumJump" style="font-size:14px;font-weight:700;color:#c2410c">-</div>
              </div>
              <div style="background:#fdf4ff;border-radius:8px;padding:10px;text-align:center;">
                <div style="font-size:11px;color:#6b7280;margin-bottom:2px">신체기록</div>
                <div id="sumBody" style="font-size:14px;font-weight:700;color:#7c3aed">-</div>
              </div>
            </div>
          </div>
          <div class="rpt-status" id="rptStatus"></div>
          <div id="reportCard" style="display:none;background:#fffef9;border-radius:20px;padding:28px;width:390px;font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;box-shadow:0 4px 24px rgba(0,0,0,0.12);">
  <!-- 헤더 -->
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding-bottom:14px;border-bottom:2px solid #1e3a5f;">
    <div style="display:flex;align-items:center;gap:10px;">
      <div style="background:#1e3a5f;color:white;font-weight:900;font-size:16px;padding:6px 12px;border-radius:8px;">FILLYO</div>
      <div>
        <div id="rc-academy" style="font-weight:700;font-size:13px;color:#1e3a5f;"></div>
        <div id="rc-month" style="font-size:12px;color:#6b7280;"></div>
      </div>
    </div>
    <div style="text-align:right;">
      <div id="rc-name" style="font-size:17px;font-weight:900;color:#1e3a5f;"></div>
      <div id="rc-belt" style="font-size:12px;color:#6b7280;margin-top:2px;"></div>
    </div>
  </div>

  <!-- 데이터 요약 -->
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px;">
    <div style="background:linear-gradient(135deg,#22c55e,#16a34a);border-radius:12px;padding:12px 8px;text-align:center;">
      <div style="font-size:18px;margin-bottom:4px;">📅</div>
      <div style="font-size:10px;color:rgba(255,255,255,0.85);margin-bottom:4px;">출석</div>
      <div id="rc-attend" style="font-size:14px;font-weight:800;color:white;"></div>
    </div>
    <div style="background:linear-gradient(135deg,#f97316,#ea580c);border-radius:12px;padding:12px 8px;text-align:center;">
      <div style="font-size:18px;margin-bottom:4px;">📋</div>
      <div style="font-size:10px;color:rgba(255,255,255,0.85);margin-bottom:4px;">심사결과</div>
      <div id="rc-exam" style="font-size:13px;font-weight:800;color:white;"></div>
    </div>
    <div style="background:linear-gradient(135deg,#38bdf8,#0ea5e9);border-radius:12px;padding:12px 8px;text-align:center;">
      <div style="font-size:18px;margin-bottom:4px;">🪢</div>
      <div style="font-size:10px;color:rgba(255,255,255,0.85);margin-bottom:4px;">줄넘기</div>
      <div id="rc-jump" style="font-size:13px;font-weight:800;color:white;"></div>
    </div>
    <div style="background:linear-gradient(135deg,#a78bfa,#7c3aed);border-radius:12px;padding:12px 8px;text-align:center;">
      <div style="font-size:18px;margin-bottom:4px;">📏</div>
      <div style="font-size:10px;color:rgba(255,255,255,0.85);margin-bottom:4px;">신체기록</div>
      <div id="rc-body" style="font-size:11px;font-weight:800;color:white;"></div>
    </div>
  </div>

  <!-- 리포트 텍스트 (문단별 카드) -->
  <div id="rc-paragraphs" style="display:flex;flex-direction:column;gap:10px;margin-bottom:16px;"></div>

  <!-- 푸터 -->
  <div style="display:flex;align-items:center;justify-content:space-between;">
    <div style="font-size:10px;color:#9ca3af;">성장리포트 by FILLYO</div>
    <div style="font-size:10px;color:#9ca3af;">fillyo.kr</div>
  </div>
</div>

          <div id="rptResultWrap" style="display:none" class="rpt-result-wrap">
            <div class="rpt-result-title">AI 생성 리포트</div>
            <div class="rpt-result" id="rptResult"></div>
            <button class="btn-copy" onclick="copyReport()">복사</button>
            <button class="btn-copy" id="btnSaveImage" onclick="window.saveReportImage()" style="background:#15803d;margin-left:8px;">📷 이미지 저장</button>
          </div>
          <div id="prevReportsWrap" style="display:none;margin-top:14px;">
            <div style="font-size:12px;font-weight:700;color:#1e3a5f;margin-bottom:8px;">📁 이전 리포트</div>
            <div id="prevReportsList" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- API Key Modal -->
<div class="overlay" id="apiKeyOverlay" style="display:none">
  <div class="modal">
    <h3>Anthropic API 키 설정</h3>

function beltBadge(belt, grade) {
  const BG = {
    '흰띠':'#e5e7eb',  '흰검띠':'#ffffff',
    '노란띠':'#eab308', '노검띠':'#eab308',
    '주황띠':'#f97316', '주황검띠':'#f97316',
    '초록띠':'#16a34a', '초록검띠':'#16a34a',
    '파란띠':'#2563eb', '파란검띠':'#2563eb',
    '보라띠':'#7c3aed', '보라검띠':'#7c3aed',
    '밤띠':'#92400e',   '밤검띠':'#92400e',
    '빨간띠':'#dc2626',
    '1품단':'#1f2937',  '2품단':'#1f2937',  '3품단':'#1f2937',  '4품단':'#1f2937',
  };
  const BLACK_STRIPE = new Set(['흰검띠','노검띠','주황검띠','초록검띠','파란검띠','보라검띠','밤검띠']);
  const DAN_LIST     = ['1품단','2품단','3품단','4품단'];
  const DAN_POS      = {1:['50%'],2:['33%','67%'],3:['25%','50%','75%'],4:['20%','40%','60%','80%']};
  const LIGHT        = new Set(['흰띠','흰검띠']);
  const WHITE_BG     = new Set(['흰검띠']);

  const isDanGrade = grade && /^\d+단$/.test(grade);
  const danGradeN  = isDanGrade ? parseInt(grade) : 0;
  const isDanBelt  = DAN_LIST.includes(belt);

  let bgCss;
  if (belt === '1품단' && !isDanGrade) {
    bgCss = 'background:linear-gradient(to bottom,#1f2937 50%,#dc2626 50%)';
  } else {
    bgCss = `background:${BG[belt] || '#9ca3af'}`;
  }

  let stripes = '';
  if (BLACK_STRIPE.has(belt)) {
    const stripeColor = WHITE_BG.has(belt) ? '#1f2937' : '#111111';
    stripes = `<span class="belt-stripe" style="top:50%;transform:translateY(-50%);height:3px;background:${stripeColor};border-radius:0"></span>`;
  } else if (isDanBelt && isDanGrade) {
    const pos = DAN_POS[Math.min(danGradeN, 4)] || ['50%'];
    stripes = pos.map(p =>
      `<span class="belt-stripe" style="top:${p};transform:translateY(-50%);height:2px;background:#fbbf24"></span>`
    ).join('');
  } else if (belt === '2품단') {
    stripes = `<span class="belt-stripe" style="top:50%;transform:translateY(-50%);height:3px;background:#dc2626"></span>`;
  } else if (belt === '4품단') {
    stripes = `<span style="position:absolute;right:3px;top:50%;transform:translateY(-50%);font-size:10px;line-height:1;z-index:2">⭐</span>`;
  }

  const textColor = belt === '흰검띠' ? '#1f2937' : (LIGHT.has(belt) ? '#374151' : '#ffffff');
  const tShadow   = LIGHT.has(belt) ? 'none' : '0 1px 2px rgba(0,0,0,0.5)';
  const shortLabel = grade || belt;
  const fullLabel  = belt + (grade ? ' ' + grade : '');

  const borderStyle = belt === '흰검띠' ? ';border:2px solid #9ca3af' : '';
  return (
    `<span class="belt-wrap" title="${fullLabel}">` +
      `<span class="belt-strip" style="${bgCss}${borderStyle}">` +
        stripes +
        `<span class="belt-strip-text" style="color:${textColor};text-shadow:${tShadow}">${shortLabel}</span>` +
      `</span>` +
    `</span>`
  );
}

function todayStr(){
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

// ── 학생 목록 로드 ────────────────────────────────────────────────────
function loadStudents() {
  onValue(ref(db, `academies/${academyId}/exam/students`), snap => {
    const raw = snap.val() || {};
    students = Object.entries(raw).map(([id, s]) => ({ id, ...s }));
    students.sort((a,b) => (a.name||'').localeCompare(b.name||'','ko'));
    filterStudents();
  });
}

const BELT_ORDER = ['흰띠','흰검띠','노란띠','노검띠','주황띠','주황검띠','초록띠','초록검띠','파란띠','파란검띠','보라띠','보라검띠','밤띠','밤검띠','빨간띠','1품단','2품단','3품단','4품단'];

function filterStudents(){
  const q = (document.getElementById('searchInput')?.value||'').trim().toLowerCase();
  const sort = document.getElementById('sortSelect')?.value || 'name';
  let list = [...students];
  if(q) list = list.filter(s => (s.name||'').toLowerCase().includes(q));
  if(sort==='name') list.sort((a,b)=>(a.name||'').localeCompare(b.name||'','ko'));
  else if(sort==='belt-high') list.sort((a,b)=>(BELT_ORDER.indexOf(b.belt||'')-BELT_ORDER.indexOf(a.belt||'')));
  else if(sort==='belt-low') list.sort((a,b)=>(BELT_ORDER.indexOf(a.belt||'')-BELT_ORDER.indexOf(b.belt||'')));
  else if(sort==='age') list.sort((a,b)=>(b.age||0)-(a.age||0));
  renderStudentList(list);
}
window.filterStudents = filterStudents;

function renderStudentList(list){
  const el = document.getElementById('studentList');
  if (!students.length){
    el.innerHTML = '<div class="no-record" style="grid-column:1/-1;padding:20px;text-align:center;color:#888;">등록된 수련생이 없습니다</div>';
    return;
  }
  el.innerHTML = (list||students).map(s => `
    <div class="s-item ${selStudent?.id===s.id?'active':''}" data-id="${s.id}" onclick="window._selectStudent('${s.id}')">
      <div style="flex:1;min-width:0">
        <div class="s-name">${s.name||'이름없음'}</div>
        <div style="margin-top:3px">${beltBadge(s.belt||'흰띠', s.grade||'')}</div>
      </div>
    </div>
  `).join('');
}

// ── 학생 선택 ────────────────────────────────────────────────────────
window._selectStudent = function(id){
  selStudent = students.find(s => s.id === id) || null;
  if (!selStudent) return;

  renderStudentList();
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('detailPanel').style.display = '';
  if(window.innerWidth <= 768){
    document.querySelector('.sidebar').classList.add('hidden');
    document.querySelector('.panel').classList.add('mobile-show');
  }

  document.getElementById('selName').textContent = selStudent.name || '';
  document.getElementById('selBeltBadge').innerHTML = beltBadge(selStudent.belt||'흰띠', selStudent.grade||'');

  // 탭 초기화
  switchTab('body', document.querySelector('.tab-btn[data-tab="body"]'));

  loadBodyRecords();
  loadTraits();
};

window.mobileBack = function(){
  if(window.innerWidth <= 768){
    document.querySelector('.sidebar').classList.remove('hidden');
    document.querySelector('.panel').classList.remove('mobile-show');
  }
};

// ── 탭 전환 ──────────────────────────────────────────────────────────
window.switchTab = function(name, btn){
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  if (btn) btn.classList.add('active');
  document.getElementById('tab' + name.charAt(0).toUpperCase() + name.slice(1)).classList.add('active');
  if (name === 'report') loadPrevReports();
};

// ── Tab1: 성장기록 ────────────────────────────────────────────────────
function loadBodyRecords(){
  if (!selStudent) return;
  onValue(ref(db, `academies/${academyId}/reportData/${selStudent.id}/bodyRecords`), snap => {
    bodyRecords = {};
    if (snap.exists()) snap.forEach(c => { bodyRecords[c.key] = c.val(); });
    renderBodyRecords();
  }, { onlyOnce: true });
}

function renderBodyRecords(){
  const el = document.getElementById('bodyList');
  const sorted = Object.entries(bodyRecords).sort((a,b) => (b[1].date||'').localeCompare(a[1].date||''));
  if (!sorted.length){
    el.innerHTML = '<div class="no-record">기록이 없습니다</div>';
    return;
  }
  el.innerHTML = sorted.map(([key, r]) => `
    <div class="body-rec">
      <div class="rec-date">${r.date||''}</div>
      <div class="rec-vals">
        ${r.height ? `키 ${r.height}cm ` : ''}<span>${r.height&&r.weight?'/ ':''}</span>${r.weight ? `몸무게 ${r.weight}kg` : ''}
      </div>
      <button class="btn-del" onclick="window._delBodyRecord('${key}')">삭제</button>
    </div>
  `).join('');
}

window.addBodyRecord = async function(){
  if (!selStudent) return;
  const date   = document.getElementById('fDate').value;
  const height = document.getElementById('fHeight').value;
  const weight = document.getElementById('fWeight').value;
  if (!date){ alert('측정일을 입력하세요.'); return; }
  if (!height && !weight){ alert('키 또는 몸무게를 입력하세요.'); return; }

  const data = { date };
  if (height) data.height = parseFloat(height);
  if (weight) data.weight = parseFloat(weight);

  await push(ref(db, `academies/${academyId}/reportData/${selStudent.id}/bodyRecords`), data);
  document.getElementById('fHeight').value = '';
  document.getElementById('fWeight').value = '';
  loadBodyRecords();
};

window._delBodyRecord = async function(key){
  if (!selStudent || !confirm('이 기록을 삭제할까요?')) return;
  await remove(ref(db, `academies/${academyId}/reportData/${selStudent.id}/bodyRecords/${key}`));
  delete bodyRecords[key];
  renderBodyRecords();
};

// ── Tab2: 성격태그 ────────────────────────────────────────────────────
function loadTraits() {
  if (!selStudent || !selStudent.id) return;
  get(ref(db, `academies/${academyId}/reportData/${selStudent.id}/traits`)).then(snap => {
    traitFlags = snap.exists() ? (snap.val() || {}) : {};
    renderTraits();
  });
}

function renderTraits() {
  const grid = document.getElementById('traitGrid');
  grid.innerHTML = TRAIT_CATEGORIES.map(cat => `
    <div style="margin-bottom:16px;">
      <div style="font-weight:700;font-size:13px;color:#1e3a5f;margin-bottom:8px;padding-bottom:4px;border-bottom:2px solid #e5e7eb;">${cat.label}</div>
      ${cat.items.map(item => {
        const sel = traitFlags[item.key];
        const bg = sel==='pos' ? '#f0fdf4' : sel==='neg' ? '#fff7ed' : sel==='mid' ? '#f9fafb' : 'transparent';
        return `
        <div style="display:flex;align-items:center;padding:12px 4px;border-bottom:1px solid #f3f4f6;gap:8px;background:${bg};border-radius:6px;margin-bottom:2px;">
          <div style="width:90px;font-size:12px;color:#6b7280;flex-shrink:0;">${item.pos}</div>
          <div style="display:flex;gap:6px;flex:1;justify-content:center;">
            ${['pos','mid','neg'].map(v => `
              <label style="display:flex;flex-direction:column;align-items:center;cursor:pointer;gap:2px;">
                <input type="radio" name="trait_${item.key}" value="${v}"
                  ${traitFlags[item.key]===v?'checked':''}
                  onchange="window._saveTrait('${item.key}','${v}')"
                  style="cursor:pointer;width:18px;height:18px;">
                <span style="font-size:10px;color:${v==='pos'?'#15803d':v==='neg'?'#dc2626':'#6b7280'}">${v==='pos'?'◎':v==='mid'?'△':'✕'}</span>
              </label>
            `).join('')}
          </div>
          <div style="width:90px;font-size:12px;color:#6b7280;flex-shrink:0;text-align:right;">${item.neg}</div>
        </div>`;
      }).join('')}
    </div>
  `).join('');
}

window._saveTrait = async function(key, val) {
  if (!selStudent || !selStudent.id) return;
  traitFlags[key] = val;
  await set(ref(db, `academies/${academyId}/reportData/${selStudent.id}/traits`), traitFlags);
  const msg = document.getElementById('traitMsg');
  msg.textContent = '✓ 저장됨';
  setTimeout(() => { msg.textContent = ''; }, 1500);
};

// ── Tab3: 리포트 생성 ─────────────────────────────────────────────────
window.generateReport = async function(){
  if (!selStudent){ alert('수련생을 선택하세요.'); return; }

  if (!apiKey){ openApiKeyModal(); return; }

  const startVal = document.getElementById('rptStart').value;
  const endVal = document.getElementById('rptEnd').value;
  if (!startVal || !endVal){ alert('시작월과 종료월을 선택하세요.'); return; }
  if (startVal > endVal){ alert('시작월이 종료월보다 늦을 수 없습니다.'); return; }

  const btn = document.getElementById('btnGenerate');
  btn.disabled = true;
  const statusEl = document.getElementById('rptStatus');
  const resultWrap = document.getElementById('rptResultWrap');
  resultWrap.style.display = 'none';

  try {
    // A. 출석 데이터 수집 (시작월~종료월 전체)
    statusEl.innerHTML = '<div class="rpt-loading"><div class="spinner"></div>출석 데이터 수집 중...</div>';
    let totalDays = 0, absentDays = 0;
    const dayReads = [];
    const dayKeys = [];
    {
      let [cy, cm] = startVal.split('-').map(Number);
      const [ey, em] = endVal.split('-').map(Number);
      while (cy < ey || (cy === ey && cm <= em)) {
        const dim = new Date(cy, cm, 0).getDate();
        for (let d = 1; d <= dim; d++) {
          const key = `${cy}-${String(cm).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
          dayKeys.push(key);
          dayReads.push(get(ref(db, `academies/${academyId}/days/${key}`)));
        }
        cm++;
        if (cm > 12) { cm = 1; cy++; }
      }
    }
    const daySnaps = await Promise.all(dayReads);
    daySnaps.forEach(snap => {
      if (!snap.exists()) return;
      const data = snap.val();
      if (!data.att) return; // 저장된 일지가 없으면 스킵
      totalDays++;
      const absList = data.absList || [];
      const wasAbsent = absList.some(a => (a.name||'').trim() === (selStudent.name||'').trim());
      if (wasAbsent) absentDays++;
    });
    const presentDays = totalDays - absentDays;

    // 업무일지 특이사항/상담/결석사유 수집
    const memoLines = [];
    const studentName = (selStudent.name || '').trim();
    daySnaps.forEach((snap, idx) => {
      if (!snap.exists()) return;
      const d = snap.val();
      if (!d) return;
      const dateKey = dayKeys[idx];
      if (d.absList && Array.isArray(d.absList)) {
        d.absList.forEach(a => {
          if ((a.name||'').trim() === studentName && a.reason && a.reason.trim()) {
            memoLines.push(`결석사유(${dateKey}): ${a.reason.trim()}`);
          }
        });
      }
      if (d.event && d.event.includes(studentName)) {
        memoLines.push(`특이사항(${dateKey}): ${d.event.trim()}`);
      }
      if (d.cons && d.cons.includes(studentName)) {
        memoLines.push(`상담(${dateKey}): ${d.cons.trim()}`);
      }
    });

    // B. 승급심사 데이터
    const belt  = selStudent.belt  || '흰띠';
    const grade = selStudent.grade || '';
    const certDates = [selStudent.certDate1, selStudent.certDate2, selStudent.certDate3, selStudent.certDate4].filter(Boolean);
    const lastCert = certDates.length ? certDates[certDates.length - 1] : null;

    // 최근 심사 결과 (evaluations 경로에서)
    let lastEvalResult = null;
    const evalSnap = await get(ref(db, `academies/${academyId}/exam/evaluations`));
    if (evalSnap.exists()) {
      const evalData = evalSnap.val();
      const allEvals = [];
      Object.values(evalData).forEach(round => {
        if (round.results) {
          Object.values(round.results).forEach(r => {
            if ((r.name||'').trim() === (selStudent.name||'').trim()) {
              allEvals.push({ date: round.date || '', passed: r.passed, total: r.total });
            }
          });
        }
      });
      if (allEvals.length) {
        allEvals.sort((a,b) => b.date.localeCompare(a.date));
        lastEvalResult = allEvals[0];
      }
    }

    // C. 줄넘기 데이터
    statusEl.innerHTML = '<div class="rpt-loading"><div class="spinner"></div>줄넘기 데이터 수집 중...</div>';
    let jumpropeLevel = null;
    const jrSnap = await get(ref(db, `academies/${academyId}/jumprope/students`));
    if (jrSnap.exists()){
      const jrData = jrSnap.val();
      const jrList = Array.isArray(jrData) ? jrData : Object.values(jrData);
      const jrStu = jrList.find(s => s && (s.name||'').trim() === (selStudent.name||'').trim());
      if (jrStu) jumpropeLevel = jrStu.level || null;
    }

    // D. 신체 기록 (최근 2개)
    statusEl.innerHTML = '<div class="rpt-loading"><div class="spinner"></div>신체 기록 수집 중...</div>';
    const bSnap = await get(ref(db, `academies/${academyId}/reportData/${selStudent.id}/bodyRecords`));
    let recentBodyRecs = [];
    if (bSnap.exists()){
      const all = [];
      bSnap.forEach(c => all.push(c.val()));
      all.sort((a,b) => (b.date||'').localeCompare(a.date||''));
      recentBodyRecs = all.slice(0, 2);
    }

    // E. 성격 태그
    const tSnap = await get(ref(db, `academies/${academyId}/reportData/${selStudent.id}/traits`));
    const traitsObj = tSnap.exists() ? (tSnap.val() || {}) : {};

    // 요약카드 업데이트
    const sumDiv = document.getElementById('dataSummary');
    sumDiv.style.display = '';
    document.getElementById('sumAttend').textContent = totalDays > 0 ? `${presentDays}일 출석` : '기록없음';
    document.getElementById('sumExam').textContent = lastEvalResult ? (lastEvalResult.passed ? '✅ 합격' : '❌ 불합격') : '기록없음';
    document.getElementById('sumJump').textContent = jumpropeLevel || '기록없음';
    document.getElementById('sumBody').textContent = recentBodyRecs.length ? `${recentBodyRecs[0].height||''}cm / ${recentBodyRecs[0].weight||''}kg` : '기록없음';

    // F. 데이터 조합 → Claude API 호출
    statusEl.innerHTML = '<div class="rpt-loading"><div class="spinner"></div>AI 리포트 생성 중...</div>';

    const dataLines = [];
    dataLines.push(`학원명: ${academyName}`);
    dataLines.push(`수련생 이름: ${selStudent.name}`);
    dataLines.push(`현재 띠: ${belt}${grade ? ' ' + grade : ''}`);
    if (lastCert) dataLines.push(`최근 심사일: ${lastCert}`);
    if (lastEvalResult) {
      const passStr = lastEvalResult.passed ? '합격' : '불합격';
      const scoreStr = lastEvalResult.total ? ` (${lastEvalResult.total}점)` : '';
      dataLines.push(`최근 심사 결과: ${passStr}${scoreStr}`);
    }
    if (totalDays > 0) {
      const periodStr = startVal === endVal
        ? `${startVal.replace('-','년 ')}월`
        : `${startVal.replace('-','년 ')}월~${endVal.split('-')[1]}월`;
      dataLines.push(`${periodStr} 출석: ${totalDays}일 중 ${presentDays}일 출석 (결석 ${absentDays}일)`);
    }
    if (jumpropeLevel) dataLines.push(`줄넘기 급수: ${jumpropeLevel}`);
    if (recentBodyRecs.length >= 2){
      const [latest, prev] = recentBodyRecs;
      if (latest.height && prev.height){
        const hDiff = (latest.height - prev.height).toFixed(1);
        dataLines.push(`키: ${latest.height}cm (이전 ${prev.height}cm, ${hDiff > 0 ? '+' : ''}${hDiff}cm)`);
      } else if (latest.height){
        dataLines.push(`키: ${latest.height}cm`);
      }
      if (latest.weight && prev.weight){
        const wDiff = (latest.weight - prev.weight).toFixed(1);
        dataLines.push(`몸무게: ${latest.weight}kg (이전 ${prev.weight}kg, ${wDiff > 0 ? '+' : ''}${wDiff}kg)`);
      } else if (latest.weight){
        dataLines.push(`몸무게: ${latest.weight}kg`);
      }
    } else if (recentBodyRecs.length === 1){
      const r = recentBodyRecs[0];
      if (r.height) dataLines.push(`키: ${r.height}cm`);
      if (r.weight) dataLines.push(`몸무게: ${r.weight}kg`);
    }
    const traitLines = [];
    TRAIT_CATEGORIES.forEach(cat => {
      cat.items.forEach(item => {
        const v = traitsObj[item.key];
        if (v === 'pos') traitLines.push(`${item.pos}`);
        else if (v === 'neg') traitLines.push(`${item.neg} (성장 중)`);
      });
    });
    if (traitLines.length) dataLines.push(`성격/태도 특성: ${traitLines.join(', ')}`);
    if (memoLines.length) dataLines.push(`기간 내 특이사항:\n${memoLines.join('\n')}`);

    const userContent = `아래 데이터를 바탕으로 학부모 발송용 성장 리포트 문구를 작성해주세요.\n\n${dataLines.join('\n')}`;

    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'content-type': 'application/json',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1024,
        system: `당신은 태권도장 원장님을 도와 학부모에게 보낼 학생 성장 리포트 문구를 작성하는 전문 도우미입니다.

[작성 원칙]
- 주어진 데이터에 있는 항목만 자연스럽게 포함하고, 없는 항목은 절대 언급하지 마세요.
- 마크다운 문법(**굵게** 등)은 절대 사용하지 마세요. 일반 텍스트로만 작성하세요.
- 따뜻하고 전문적인 톤으로, 학부모가 카카오톡으로 받았을 때 기분 좋게 읽힐 수 있도록 작성하세요.
- 300~400자 내외로 작성하세요.
- 학원명 태그 없이 바로 인사말로 시작하세요. 아이 이름을 자연스럽게 포함하세요.
- 문단을 3~4개로 나눠 작성하세요: ①출석/성실도 ②실력(심사/줄넘기) ③성장(신체/성격) ④지도진 다짐

[줄넘기 급수 설명 - 급수 언급 시 반드시 포함]
10급: 모둠발 앞으로 뛰기 (줄넘기의 첫 걸음)
9급: 모둠발 뒤로 뛰기
8급: 한발 번갈아 뛰기
7급: 가위바위보 뛰기
6급: 무릎올리기+엉덩이차기
5급: 엇걸어 뛰기 (줄이 몸 앞에서 교차)
4급: 엇걸었다 풀어 뛰기
3급: 되돌리기
2급: 되돌리기+다리 들어주기
1급: 2단 뛰기 (줄넘기 최고 기술 중 하나)
- 현재 급수가 무엇을 완성했는지, 다음 급수에서 무엇에 도전하는지 설명하세요.

[태권도 띠별 심사 내용 - 띠 언급 시 반드시 포함]
흰띠/흰검띠: 기본 자세와 예절 (태권도의 첫 시작)
노란띠/노검띠: 태극 1장 + 앞차기
주황띠/주황검띠: 태극 2장 + 돌려차기
초록띠/초록검띠: 태극 3장 + 내려차기
파란띠/파란검띠: 태극 4장 + 옆차기
보라띠/보라검띠: 태극 5장 + 옆차기(발날)
밤띠/밤검띠: 태극 6장 + 옆후려차기
빨간띠: 태극 1장~8장 종합 + 약속겨루기 (국기원 승품단심사 준비 단계)
1품단: 고려 품새 + 뒤차기, 익스트림: 돌려+돌게+뒤후려차기/에어리얼 (검은띠의 시작, 태권도 수련의 새로운 단계)
2품단: 금강 품새 + 뛰어뒤차기, 익스트림: 팜턴/핸드스프링
3품단: 태백 품새 + 뛰어옆차기, 익스트림: 외발턴540도/하우스턴
4품단: 평원 품새 + 가위차기, 익스트림: 720도이상/뒤공중앞공중

[유급자(흰띠~빨간띠) 작성 방식]
- 현재 띠에서 배우는 기술이 무엇인지 설명하고, 다음 심사에서 도전할 내용을 언급하세요.

[품단(1~4품단) 작성 방식]
- 품단은 같은 품새를 더 깊이 익히며 완성도를 높여가는 단계임을 설명하세요.
- "지난번보다 동작이 더 정확해졌다", "힘과 균형이 발전했다" 등 성숙과 숙달의 언어를 사용하세요.
- 다음 단계 기술 설명 대신, 현재 수련의 깊이와 성장을 강조하세요.

[신체 기록 작성 방식]
- 키와 몸무게를 구체적인 숫자로 언급하세요. (예: "키 142.5cm, 몸무게 38kg")
- 이전 기록이 있으면 변화를 자연스럽게 언급하세요. (예: "지난달보다 키가 0.5cm 자랐어요")

[업무일지 메모 작성 방식]
- 민감한 내용(싸움, 갈등 등)은 직접 언급하지 말고 "친구들과의 관계에서 배려와 대화를 배우고 있습니다" 처럼 긍정적으로 순화하세요.

[마지막 문단 - 항상 포함]
- "저희 지도진은 앞으로 ~에 더욱 신경 쓰겠습니다" 형식으로 지도진의 다짐을 자연스럽게 포함하세요.`,
        messages: [{ role: 'user', content: userContent }],
      }),
    });

    if (!res.ok){
      const err = await res.json().catch(() => ({}));
      throw new Error(err?.error?.message || `API 오류 (${res.status})`);
    }

    const json = await res.json();
    const text = json.content?.[0]?.text || '';

    document.getElementById('rptResult').textContent = text;
    resultWrap.style.display = '';
    statusEl.textContent = '';

    // Firebase 저장 (최근 4개 유지)
    const rptKey = `${startVal}_${endVal}`;
    await set(ref(db, `academies/${academyId}/reportData/${selStudent.id}/reports/${rptKey}`), {
      text,
      createdAt: new Date().toISOString().slice(0,10),
      start: startVal,
      end: endVal,
      attend: document.getElementById('sumAttend').textContent,
      exam: document.getElementById('sumExam').textContent,
      jump: document.getElementById('sumJump').textContent,
      body: document.getElementById('sumBody').textContent,
    });
    const reportsSnap = await get(ref(db, `academies/${academyId}/reportData/${selStudent.id}/reports`));
    if (reportsSnap.exists()) {
      const allKeys = Object.keys(reportsSnap.val()).sort();
      for (const k of allKeys.slice(0, Math.max(0, allKeys.length - 4))) {
        await remove(ref(db, `academies/${academyId}/reportData/${selStudent.id}/reports/${k}`));
      }
    }
    await loadPrevReports();

  } catch(e) {
    statusEl.textContent = `오류: ${e.message}`;
    console.error(e);
  } finally {
    btn.disabled = false;
  }
};

window.saveReportImage = async function() {
  const resultText = document.getElementById('rptResult').textContent;
  if (!resultText) { alert('먼저 리포트를 생성해주세요.'); return; }

  // 카드 데이터 채우기
  document.getElementById('rc-academy').textContent = academyName;
  const startV = document.getElementById('rptStart').value;
  const endV = document.getElementById('rptEnd').value;
  const [sY, sM] = startV.split('-');
  const [, eM] = endV.split('-');
  document.getElementById('rc-month').textContent = startV === endV
    ? `${sY}년 ${sM}월 성장리포트`
    : `${sY}년 ${sM}월~${eM}월 성장리포트`;
  document.getElementById('rc-name').textContent = selStudent.name || '';
  document.getElementById('rc-belt').textContent = (selStudent.belt || '') + (selStudent.grade ? ' ' + selStudent.grade : '');
  const fallback = v => (!v || v === '-') ? '기록없음' : v;
  document.getElementById('rc-attend').textContent = fallback(document.getElementById('sumAttend').textContent);
  document.getElementById('rc-exam').textContent = fallback(document.getElementById('sumExam').textContent);
  document.getElementById('rc-jump').textContent = fallback(document.getElementById('sumJump').textContent);
  document.getElementById('rc-body').textContent = fallback(document.getElementById('sumBody').textContent);

  const paraColors = [
    { bg: '#f0fdf4', border: '#22c55e' },
    { bg: '#fff7ed', border: '#f97316' },
    { bg: '#eff6ff', border: '#3b82f6' },
    { bg: '#fdf4ff', border: '#a855f7' },
  ];
  const parasEl = document.getElementById('rc-paragraphs');
  parasEl.innerHTML = resultText.split('\n\n').filter(Boolean).map((p, i) => {
    const c = paraColors[i % paraColors.length];
    const escaped = p.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
    return `<div style="font-size:11px;line-height:1.7;color:#1f2937;background:${c.bg};border-radius:8px;padding:12px 14px;border-left:4px solid ${c.border};">${escaped}</div>`;
  }).join('');

  // 카드 표시
  const card = document.getElementById('reportCard');
  card.style.display = 'block';
  card.style.position = 'fixed';
  card.style.top = '-9999px';
  card.style.left = '0';
  document.body.appendChild(card);

  try {
    const canvas = await html2canvas(card, {
      scale: 3,
      useCORS: true,
      backgroundColor: '#ffffff'
    });

    // 다운로드
    const link = document.createElement('a');
    link.download = `${selStudent.name || '수련생'}_성장리포트_${startV}_${endV}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
  } finally {
    card.style.display = 'none';
    card.style.position = '';
    card.style.top = '';
  }
};

async function loadPrevReports() {
  if (!selStudent || !academyId) return;
  document.getElementById('rptResultWrap').style.display = 'none';
  document.getElementById('rptStatus').textContent = '';
  const snap = await get(ref(db, `academies/${academyId}/reportData/${selStudent.id}/reports`));
  const wrap = document.getElementById('prevReportsWrap');
  const listEl = document.getElementById('prevReportsList');
  if (!snap.exists()) { wrap.style.display = 'none'; return; }
  const all = Object.entries(snap.val())
    .sort((a, b) => b[0].localeCompare(a[0]))
    .slice(0, 4);
  if (!all.length) { wrap.style.display = 'none'; return; }
  window._prevReportsData = Object.fromEntries(all);
  wrap.style.display = '';
  listEl.innerHTML = all.map(([key, r]) => {
    const label = r.start && r.end
      ? `${r.start.split('-')[1]}월~${r.end.split('-')[1]}월`
      : (r.month ? r.month.replace('-','년 ') + '월' : key);
    const dateStr = r.createdAt ? ` (${r.createdAt})` : '';
    const safeKey = key.replace(/'/g, "\\'");
    return `<div style="display:flex;align-items:center;gap:4px;">` +
      `<button onclick="window._showPrevReport('${safeKey}')" style="padding:6px 12px;border:1.5px solid #1e3a5f;border-radius:20px;background:white;color:#1e3a5f;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;">${label}${dateStr}</button>` +
      `<button onclick="window._deletePrevReport('${safeKey}')" style="padding:4px 7px;border:1.5px solid #e5e7eb;border-radius:50%;background:white;color:#9ca3af;font-size:12px;cursor:pointer;line-height:1;" title="삭제">🗑️</button>` +
      `</div>`;
  }).join('');
}

window._showPrevReport = function(key) {
  const r = window._prevReportsData?.[key];
  if (!r || !r.text) return;
  document.getElementById('rptResult').textContent = r.text;
  document.getElementById('rptResultWrap').style.display = '';
  document.getElementById('dataSummary').style.display = 'none';
  document.getElementById('rptStatus').textContent = `📁 저장된 리포트 (${r.createdAt || ''}) · 새로 생성하려면 [리포트 생성] 클릭`;
  if (r.attend !== undefined) document.getElementById('sumAttend').textContent = r.attend;
  if (r.exam !== undefined) document.getElementById('sumExam').textContent = r.exam;
  if (r.jump !== undefined) document.getElementById('sumJump').textContent = r.jump;
  if (r.body !== undefined) document.getElementById('sumBody').textContent = r.body;
};

window._deletePrevReport = async function(key) {
  if (!confirm('이 리포트를 삭제할까요?')) return;
  await remove(ref(db, `academies/${academyId}/reportData/${selStudent.id}/reports/${key}`));
  await loadPrevReports();
};

window.copyReport = function(){
  const text = document.getElementById('rptResult').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.btn-copy');
    btn.textContent = '복사됨 ✓';
    setTimeout(() => { btn.textContent = '복사'; }, 1500);
  });
};

// ── API Key Modal ─────────────────────────────────────────────────────
window.openApiKeyModal = function(){
  document.getElementById('apiKeyInput').value = apiKey || '';
  document.getElementById('apiKeyOverlay').style.display = 'flex';
};
window.closeApiKeyModal = function(){
  document.getElementById('apiKeyOverlay').style.display = 'none';
};
window.saveApiKey = async function(){
  const key = document.getElementById('apiKeyInput').value.trim();
  if (!key){ alert('API 키를 입력하세요.'); return; }
  await set(ref(db, `academies/${academyId}/settings/anthropicApiKey`), key);
  apiKey = key;
  closeApiKeyModal();
};

// ── 버튼 이벤트 ──────────────────────────────────────────────────────
document.getElementById('btnApiKey').addEventListener('click', () => { openApiKeyModal(); });

window.doLogout = async function() {
  await signOut(auth);
  location.href = '/login/';
};
</script>
