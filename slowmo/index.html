<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>FILLYO мҠ¬лЎңмҡ°лӘЁм…ҳ</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&display=swap');

:root {
  --accent:#7B61FF; --accent2:#0B7B6B;
  --red:#ff2d55; --text:#1a1a2e; --text2:#7b7fa8;
  --cell-bg:#0d0d14; --border:#e4e4f4;
  --glow:0 4px 18px rgba(123,97,255,.35);
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{
  width:100%;height:100%;overflow:hidden;
  font-family:'Space Mono',monospace;
  background:linear-gradient(135deg,#f0f0ff 0%,#fafafe 55%,#ffffff 100%);
  color:var(--text);
}

/* в”Җв”Җ APP вҖ” лӘЁл°”мқј safe viewport лҢҖмқ‘ в”Җв”Җ */
#app{
  display:flex;flex-direction:column;
  width:100vw;
  height:100vh;        /* fallback */
  height:100svh;       /* лёҢлқјмҡ°м Җ нҒ¬лЎ¬ м ңмҷё м •нҷ•н•ң лҶ’мқҙ */
}

/* в”Җв”Җ PORTRAIT лҜёлӢҲ л„Өл№„ (н—ӨлҚ” лҢҖмІҙ) в”Җв”Җ */
#ctrl-mini-nav{
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;padding-bottom:4px;border-bottom:1px solid var(--border);
}
#ctrl-mini-logo{
  font-size:14px;font-weight:900;letter-spacing:.1em;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
#ctrl-mini-home{
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border:none;color:#fff;font-size:14px;cursor:pointer;
  padding:5px 9px;border-radius:8px;font-weight:700;font-family:inherit;transition:all .15s;
}
#ctrl-mini-home:active{filter:brightness(.88);transform:scale(.94);}
/* Landscapeм—җм„ңлҠ” лҜёлӢҲ л„Өл№„ мҲЁк№Җ */

/* в”Җв”Җ GRID WRAP в”Җв”Җ */
#grid-wrap{flex:1 1 auto;padding:8px;min-height:0;}

/* в”Җв”Җ GRID в”Җв”Җ */
#grid{
  display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(2,1fr);
  gap:6px;height:100%;
}

/* в”Җв”Җ CELL в”Җв”Җ */
.cell{
  position:relative;background:var(--cell-bg);
  border-radius:8px;overflow:hidden;
  border:2.5px solid transparent;
  transition:border-color .2s,box-shadow .2s;
}
/* Colorful idle borders вҖ” BEFORE .recording/.playing so state rules override */
.cell:nth-child(1){border-color:#FF6B6B;}
.cell:nth-child(2){border-color:#FF9F43;}
.cell:nth-child(3){border-color:#FFC312;}
.cell:nth-child(4){border-color:#4FC3F7;}
.cell:nth-child(5){border-color:#CE93D8;}
.cell:nth-child(6){border-color:#80CBC4;}
.cell:nth-child(7){border-color:#F48FB1;}
.cell:nth-child(8){border-color:#80DEEA;}
.cell.recording{border-color:var(--red);box-shadow:0 0 14px rgba(255,45,85,.45);}
.cell.playing  {border-color:var(--accent);box-shadow:0 0 16px rgba(123,97,255,.4);}
.cell video{width:100%;height:100%;object-fit:cover;display:block;}

/* Cell number badge */
.cnum{
  position:absolute;top:6px;left:6px;
  width:20px;height:20px;border-radius:50%;
  background:rgba(0,0,0,.65);border:1.5px solid rgba(255,255,255,.4);
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:900;color:rgba(255,255,255,.95);
  pointer-events:none;z-index:3;
}
/* Status badge */
.cst{
  position:absolute;top:6px;right:6px;
  font-size:9px;font-weight:700;letter-spacing:.06em;
  padding:2px 7px;border-radius:999px;background:rgba(0,0,0,.55);
  z-index:3;display:flex;align-items:center;gap:3px;transition:all .2s;
}
.cell.recording .cst{background:var(--red);color:#fff;}
.cell.playing   .cst{background:var(--accent);color:#fff;}
.cell.idle      .cst{color:rgba(255,255,255,.8);}

.rdot{
  display:none;width:6px;height:6px;border-radius:50%;
  background:#fff;animation:blink .8s infinite;flex-shrink:0;
}
.cell.recording .rdot{display:block;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

.cprog{
  position:absolute;bottom:0;left:0;height:3px;width:0%;z-index:4;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  transition:width .08s linear;
}
.cell.recording .cprog{background:var(--red);}

/* в”Җв”Җ м ҖмһҘ лІ„нҠј (м…Җ мҳӨлІ„л Ҳмқҙ) в”Җв”Җ */
.csave{
  display:none;                              /* кё°ліё мҲЁк№Җ */
  position:absolute;bottom:10px;left:50%;
  transform:translateX(-50%);
  background:rgba(123,97,255,0.88);
  backdrop-filter:blur(6px);
  color:#fff;border:none;border-radius:20px;
  padding:5px 14px;font-size:10px;font-weight:700;
  font-family:'Space Mono',monospace;
  cursor:pointer;z-index:5;white-space:nowrap;
  touch-action:manipulation;transition:all .15s;
  box-shadow:0 2px 8px rgba(123,97,255,.4);
}
.cell.playing .csave{display:block;}        /* мһ¬мғқ мӨ‘мқј л•Ңл§Ң н‘ңмӢң */
.csave:active{filter:brightness(.82);transform:translateX(-50%) scale(.94);}

/* в”Җв”Җ FILLYO ICON в”Җв”Җ */
.fillyo-icon{
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border-radius:10px;width:38px;height:38px;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:900;line-height:1.2;text-align:center;
  color:#fff;flex-shrink:0;cursor:pointer;
}

/* в”Җв”Җ CONTROL PANEL (portrait: м»ҙнҢ©нҠё кі м • н•ҳлӢЁ л°”) в”Җв”Җ */
#ctrl{
  display:flex;flex-direction:column;gap:6px;
  flex-shrink:0;padding:8px 12px 10px;
  background:rgba(255,255,255,0.96);
  border-top:1px solid var(--border);
  /* лӮҙмҡ©мқҙ л„ҳміҗлҸ„ ctrl мһҗмІҙ нҒ¬кё°лҠ” мң м§Җ */
}
#ctrl-brand{display:none;}
#ctrl-title-block{display:none;}

/* Portrait: MODE + SPEED н•ң мӨ„, лқјлІЁ мҲЁк№Җ */
.ctrl-mid{display:flex;align-items:center;justify-content:center;gap:8px;}
.ctrl-section{display:flex;flex-direction:column;gap:2px;}
.ctrl-sec-label{display:none;font-size:9px;font-weight:900;color:var(--text2);letter-spacing:.2em;}

.cg{
  display:flex;align-items:center;gap:5px;
  background:#f0eeff;border:1.5px solid #d8d0ff;
  border-radius:14px;padding:5px 9px;
}
.cg label{font-size:10px;color:var(--text2);font-weight:700;}
.cg-icon{font-size:13px;}
input[type=number]{
  background:transparent;border:none;color:var(--accent);
  font-family:'Space Mono',monospace;font-size:13px;font-weight:900;
  width:26px;text-align:center;padding:0;-moz-appearance:textfield;
}
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{opacity:1;height:14px;}
input[type=number]:focus{outline:none;}

.slow-pills{
  display:flex;gap:3px;
  background:#f0eeff;border:1.5px solid #d8d0ff;border-radius:14px;padding:3px;
}
.spill{
  padding:5px 10px;border-radius:10px;font-size:11px;font-weight:700;
  font-family:'Space Mono',monospace;color:var(--text2);cursor:pointer;
  transition:all .15s;border:none;background:transparent;touch-action:manipulation;
}
.spill.active{
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;box-shadow:0 2px 8px rgba(123,97,255,.3);
}

button{
  font-family:'Space Mono',monospace;font-weight:700;
  cursor:pointer;transition:all .15s;touch-action:manipulation;border:none;
}
.ctrl-btns{display:flex;gap:8px;justify-content:center;}
#bstart{
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;border-radius:20px;font-size:14px;font-weight:900;letter-spacing:.1em;
  padding:12px 0;flex:1;max-width:220px;
  box-shadow:0 4px 16px rgba(123,97,255,.28);
}
#bstart:hover{filter:brightness(1.1);transform:translateY(-1px);box-shadow:var(--glow);}
#bstop{
  background:transparent;color:var(--red);border:2px solid var(--red);
  border-radius:20px;font-size:14px;font-weight:900;letter-spacing:.1em;
  padding:10px 0;display:none;flex:1;max-width:220px;
}
#bstop:hover{background:var(--red);color:#fff;}

/* Status + footer: portrait hidden */
#sb{display:none;}
#ctrl-footer{display:none;}
/* нҷҲ лІ„нҠј (ctrl-brand лӮҙ) */
.ctrl-home-btn{
  margin-left:auto;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border:none;color:#fff;font-size:14px;cursor:pointer;
  padding:5px 9px;border-radius:8px;font-weight:700;font-family:inherit;transition:all .15s;
}
.ctrl-home-btn:active{filter:brightness(.88);transform:scale(.94);}

/* в”Җв”Җ LANDSCAPE + нғңлё”лҰҝ/PC: мўҢмёЎ к·ёлҰ¬л“ң + мҡ°мёЎ нҢЁл„җ в”Җв”Җ */
@media(orientation:landscape), (min-width:768px){
  #app{flex-direction:row;height:100vh;height:100svh;}
  #grid-wrap{flex:1 1 auto;padding:10px 0 10px 10px;min-height:0;}
  #grid{height:100%;}

  #ctrl{
    flex-direction:column;flex-shrink:0;
    width:clamp(170px,23vw,220px);
    /* justify-content м ңкұ° вҶ’ лӮҙмҡ© мғҒлӢЁ м •л ¬, #sbк°Җ margin-top:autoлЎң н•ҳлӢЁ кі м • */
    gap:12px;
    padding:16px 14px;
    border-top:none;border-left:1px solid var(--border);
    background:rgba(255,255,255,0.97);
    overflow:hidden;
    overflow-y:auto;
    scrollbar-width:none;
  }
  #ctrl::-webkit-scrollbar{display:none;}

  /* лҜёлӢҲ л„Өл№„ мҲЁк№Җ (landscapeлҠ” ctrl-brandк°Җ лӢҙлӢ№) */
  #ctrl-mini-nav{display:none;}

  #ctrl-brand{display:flex;align-items:center;gap:8px;flex-shrink:0;}

  #ctrl-title-block{display:block;flex-shrink:0;}
  #ctrl-title{
    font-size:20px;font-weight:900;color:var(--text);line-height:1.2;margin-bottom:3px;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  }
  #ctrl-sub{font-size:10px;color:var(--text2);font-weight:700;line-height:1.5;}

  .ctrl-sec-label{display:block;}
  .ctrl-mid{flex-direction:column;align-items:stretch;gap:10px;flex-shrink:0;}
  .ctrl-section{width:100%;}
  .slow-pills{width:100%;}
  .spill{flex:1;text-align:center;padding:6px 4px;font-size:10px;}
  .cg{width:100%;justify-content:space-between;}

  .ctrl-btns{flex-direction:column;gap:8px;flex-shrink:0;}
  #bstart,#bstop{max-width:100%;width:100%;padding:12px 8px;font-size:13px;}

  /* мғҒнғңл°”: н•ҳлӢЁ кі м • */
  #sb{
    display:block;margin-top:auto;flex-shrink:0;
    font-size:8px;color:var(--text2);font-weight:700;
    letter-spacing:.04em;text-align:center;
    border-top:1px solid var(--border);padding-top:8px;line-height:1.7;
  }
  #sb b{color:var(--accent);}
}

/* в”Җв”Җ COUNTDOWN в”Җв”Җ */
#cdown{
  display:none;position:fixed;inset:0;
  background:rgba(10,10,20,.88);z-index:200;
  align-items:center;justify-content:center;flex-direction:column;
}
#cdown.on{display:flex;}
#cnum{
  font-family:'Bebas Neue',sans-serif;font-size:clamp(5rem,18vw,10rem);
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:cpulse 1s ease-in-out infinite;
}
#clabel{font-size:clamp(.7rem,2vw,.95rem);color:#e0e0f0;letter-spacing:.3em;margin-top:8px;font-weight:700;}
@keyframes cpulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}

/* в”Җв”Җ ERROR в”Җв”Җ */
#errdlg{
  display:none;position:fixed;inset:0;
  background:rgba(10,10,20,.94);z-index:300;
  align-items:center;justify-content:center;flex-direction:column;
  gap:14px;text-align:center;padding:30px;
}
#errdlg.on{display:flex;}
#errdlg h2{color:var(--red);font-family:'Bebas Neue',sans-serif;font-size:2rem;}
#errdlg p{color:#bbb;font-size:.75rem;line-height:1.8;max-width:300px;}
#errdlg button{
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;margin-top:6px;
  padding:10px 24px;border-radius:8px;font-size:13px;letter-spacing:.08em;
}
</style>
</head>
<body>
<div id="app">

  <!-- GRID -->
  <div id="grid-wrap">
    <div id="grid"></div>
  </div>

  <!-- CONTROL PANEL -->
  <div id="ctrl">

    <!-- Portrait: лҜёлӢҲ л„Өл№„ (лЎңкі  + рҹҸ ) -->
    <div id="ctrl-mini-nav">
      <span id="ctrl-mini-logo">FILLYO</span>
      <button id="ctrl-mini-home" onclick="location.href='/dashboard/'">рҹҸ </button>
    </div>

    <!-- Landscape: brand block (лЎңкі  + лі„ + рҹҸ ) -->
    <div id="ctrl-brand">
      <div class="fillyo-icon" onclick="location.href='/dashboard/'">FILL<br>YO</div>

      <button class="ctrl-home-btn" onclick="location.href='/dashboard/'">рҹҸ </button>
    </div>

    <!-- Landscape: title block -->
    <div id="ctrl-title-block">
      <div id="ctrl-title">мҠ¬лЎңмҡ°лӘЁм…ҳ</div>
      <div id="ctrl-sub">м°Ҫмқҳм Ғмқё кІ°кіјлҘј<br>л§Ңл“Өм–ҙліҙм„ёмҡ”</div>
    </div>

    <!-- MODE + SPEED -->
    <div class="ctrl-mid">
      <div class="ctrl-section">
        <div class="ctrl-sec-label">MODE</div>
        <div class="cg">
          <span class="cg-icon">рҹҺ¬</span>
          <label>нҒҙлҰҪ</label>
          <input id="dur" type="number" min="1" max="10" value="3">
          <label>мҙҲ</label>
        </div>
      </div>
      <div class="ctrl-section">
        <div class="ctrl-sec-label">SPEED</div>
        <div class="slow-pills">
          <button class="spill" data-v="0.25">0.25Г—</button>
          <button class="spill active" data-v="0.5">0.5Г—</button>
          <button class="spill" data-v="0.33">0.33Г—</button>
        </div>
      </div>
    </div>

    <!-- JS reads this select (hidden) -->
    <select id="slow" style="display:none">
      <option value="0.25">0.25Г—</option>
      <option value="0.5" selected>0.5Г—</option>
      <option value="0.33">0.33Г—</option>
    </select>

    <!-- Main buttons -->
    <div class="ctrl-btns">
      <button id="bstart">в–¶ START</button>
      <button id="bstop">в–  STOP</button>
    </div>

    <!-- Live status (landscape visible, portrait hidden) -->
    <div id="sb">SLOT <b id="sl">вҖ”</b> &nbsp;В·&nbsp; <b id="ph">IDLE</b> &nbsp;|&nbsp; CLIP <b id="cd">вҖ”</b>s &nbsp; SLOW <b id="sr">вҖ”</b>Г—</div>


  </div>
</div>

<div id="cdown"><div id="cnum">3</div><div id="clabel">RECORDING STARTS</div></div>

<div id="errdlg">
  <h2>м№ҙл©”лқј мҳӨлҘҳ</h2>
  <p id="errmsg">м№ҙл©”лқј м ‘к·ј к¶Ңн•ңмқҙ н•„мҡ”н•©лӢҲлӢӨ.<br>лёҢлқјмҡ°м Җ м„Өм •м—җм„ң н—Ҳмҡ©н•ҙ мЈјм„ёмҡ”.</p>
  <button onclick="document.getElementById('errdlg').classList.remove('on')">лӢ«кё°</button>
</div>

<script>
// в”Җв”Җ Audio (lazy init) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
let AC = null;
function ac() {
  if (!AC) AC = new (window.AudioContext || window.webkitAudioContext)();
  if (AC.state === 'suspended') AC.resume();
  return AC;
}
function beep(f=880,d=0.12,v=0.5) {
  try {
    const c=ac(), o=c.createOscillator(), g=c.createGain();
    o.connect(g); g.connect(c.destination);
    o.frequency.value=f;
    g.gain.setValueAtTime(v,c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001,c.currentTime+d);
    o.start(); o.stop(c.currentTime+d);
  } catch(e){}
}
const bstart=()=>beep(1046,.10,.6);
const bstop =()=>{beep(440,.18,.6);setTimeout(()=>beep(330,.18,.4),180);};
const bcount=()=>beep(660,.08,.4);

// в”Җв”Җ Build cells в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
const TOTAL=8;
let stream=null,running=false,slot=0;
let recorders=[],chunks=[],blobs=[];
let cells=[],vids=[],prevs=[];

const gridEl=document.getElementById('grid');
for(let i=0;i<TOTAL;i++){
  const c=document.createElement('div');
  c.className='cell idle';
  c.innerHTML=`<span class="cnum">${i+1}</span>
    <span class="cst"><span class="rdot"></span><span class="stx">IDLE</span></span>
    <video class="sv" playsinline muted></video>
    <video class="lv" playsinline muted style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:none;z-index:2"></video>
    <div class="cprog"></div>
    <button class="csave">рҹ’ҫ м ҖмһҘ</button>`;
  gridEl.appendChild(c);
  cells.push(c);
  vids.push(c.querySelector('.sv'));
  prevs.push(c.querySelector('.lv'));
  // м ҖмһҘ лІ„нҠј мқҙлІӨнҠё (нҒҙлЎңм ҖлЎң мқёлҚұмҠӨ кі м •)
  (function(idx){ c.querySelector('.csave').addEventListener('click',()=>saveSlot(idx)); })(i);
}

function setState(i,s){
  cells[i].className='cell '+s;
  cells[i].querySelector('.stx').textContent=s==='recording'?'REC':s==='playing'?'PLAY':'IDLE';
}
function setProg(i,p){ cells[i].querySelector('.cprog').style.width=p+'%'; }
function updateSB(i,ph){
  document.getElementById('sl').textContent=i>=0?i+1:'вҖ”';
  document.getElementById('ph').textContent=ph;
}

// в”Җв”Җ Start в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
const BS=document.getElementById('bstart'),BP=document.getElementById('bstop');
const durEl=document.getElementById('dur'),slowEl=document.getElementById('slow');
let clipSec=3,slowRate=.5;

async function startSys(){
  clipSec=parseFloat(durEl.value)||3;
  slowRate=parseFloat(slowEl.value)||.5;
  document.getElementById('cd').textContent=clipSec;
  document.getElementById('sr').textContent=slowRate;

  // Try back camera, fallback to any camera
  let s;
  try { s=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'},audio:false}); }
  catch(e){
    try { s=await navigator.mediaDevices.getUserMedia({video:true,audio:false}); }
    catch(e2){
      document.getElementById('errmsg').textContent='мҳӨлҘҳ: '+e2.message;
      document.getElementById('errdlg').classList.add('on');
      return;
    }
  }
  stream=s; running=true; slot=0;
  BS.style.display='none'; BP.style.display='inline-block';
  durEl.disabled=true; slowEl.disabled=true;

  await countdown(3);
  if(!running) return;
  loop();
}

function stopSys(){
  running=false;
  recorders.forEach(r=>{try{if(r&&r.state!=='inactive')r.stop();}catch(e){}});
  if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;}
  vids.forEach((v,i)=>{v.pause();v.src='';prevs[i].srcObject=null;prevs[i].style.display='none';});
  cells.forEach((_,i)=>{setState(i,'idle');setProg(i,0);});
  BS.style.display='inline-block'; BP.style.display='none';
  durEl.disabled=false; slowEl.disabled=false;
  updateSB(-1,'IDLE');
}

// в”Җв”Җ Countdown в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function countdown(n){
  return new Promise(res=>{
    const ov=document.getElementById('cdown'),ne=document.getElementById('cnum');
    ov.classList.add('on'); ne.textContent=n; bcount();
    const iv=setInterval(()=>{
      n--;
      if(n<=0){clearInterval(iv);ov.classList.remove('on');res();}
      else{ne.textContent=n;bcount();}
    },1000);
  });
}

// в”Җв”Җ Loop в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
async function loop(){
  if(!running)return;
  const i=slot;
  updateSB(i,'REC');
  await recordSlot(i);
  if(!running)return;
  playSlot(i);
  slot=(i+1)%TOTAL;
  loop();
}

function recordSlot(i){
  return new Promise(res=>{
    if(!running||!stream){res();return;}

    // мқҙ мҠ¬лЎҜмқҙ лЈЁн”„ мһ¬мғқ мӨ‘мқҙл©ҙ л©Ҳм¶”кё°
    vids[i].pause(); vids[i].loop=false;
    if(playUrls[i]){ URL.revokeObjectURL(playUrls[i]); playUrls[i]=null; }

    prevs[i].srcObject=stream; prevs[i].style.display='block';
    prevs[i].play().catch(()=>{});
    setState(i,'recording'); bstart();

    const mime=getMime();
    let rec;
    try { rec=new MediaRecorder(stream,mime?{mimeType:mime}:{}); }
    catch(e){ rec=new MediaRecorder(stream); }
    recorders[i]=rec; chunks[i]=[];

    rec.ondataavailable=e=>{if(e.data&&e.data.size>0)chunks[i].push(e.data);};
    rec.onstop=()=>{
      const type=mime||'video/webm';
      blobs[i]=new Blob(chunks[i],{type});
      prevs[i].srcObject=null; prevs[i].style.display='none';
      setState(i,'idle'); setProg(i,0); bstop(); res();
    };
    rec.start(100);

    const t0=Date.now();
    const iv=setInterval(()=>{
      if(!running){clearInterval(iv);return;}
      setProg(i,Math.min(100,((Date.now()-t0)/(clipSec*1000))*100));
    },80);
    setTimeout(()=>{clearInterval(iv);if(rec.state!=='inactive')rec.stop();},clipSec*1000);
  });
}

// к°Ғ мҠ¬лЎҜмқҳ нҳ„мһ¬ мһ¬мғқ URL м¶”м Ғ (мғҲ л…№нҷ” мӢң м •лҰ¬мҡ©)
let playUrls=[];

function playSlot(i){
  if(!blobs[i])return;

  // мқҙм „ мһ¬мғқ мӨ‘мқҙлҚҳ URL н•ҙм ң
  if(playUrls[i]){ URL.revokeObjectURL(playUrls[i]); playUrls[i]=null; }

  const url=URL.createObjectURL(blobs[i]);
  playUrls[i]=url;
  const v=vids[i];
  v.src=url;
  v.playbackRate=slowRate;
  v.loop=true;   // вҶҗ л¬ҙн•ң л°ҳліө мһ¬мғқ
  setState(i,'playing');
  v.play().catch(()=>{});
  // мғҲ л…№нҷ”к°Җ мӢңмһ‘лҗҳл©ҙ recordSlot м•Ҳм—җм„ң stop/setStateлЎң лҚ®м–ҙм”Җ
}

function getMime(){
  for(const t of['video/webm;codecs=vp9','video/webm;codecs=vp8','video/webm','video/mp4'])
    if(MediaRecorder.isTypeSupported(t))return t;
  return '';
}

// в”Җв”Җ мҳҒмғҒ м ҖмһҘ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function saveSlot(i){
  if(!blobs[i])return;
  const ext=blobs[i].type.includes('mp4')?'mp4':'webm';
  const url=URL.createObjectURL(blobs[i]);
  const a=document.createElement('a');
  a.href=url;
  a.download=`fillyo_slowmo_${i+1}_${Date.now()}.${ext}`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),3000);
}

// в”Җв”Җ Bind buttons в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
BS.addEventListener('click', startSys);
BP.addEventListener('click', stopSys);
updateSB(-1,'IDLE');

// в”Җв”Җ Slow rate pill UI
document.querySelectorAll('.spill').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.spill').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    slowEl.value=btn.dataset.v;
  });
});
