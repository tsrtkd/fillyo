<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>마이페이지 — FILLYO</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root {
  --navy:#0B1F3A; --blue:#1352A8; --sky:#E8F1FF;
  --yellow:#F9A825; --red:#C62828; --red-lt:#FFEBEE;
  --green:#1B7A3E; --green-lt:#E8F5E9;
  --gray:#546E7A; --border:#DDE4EE; --bg:#EEF2F8;
  --text:#1A2332; --text2:#4A5A6A;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* ── LOADING ─────────────────────────────────────────────────────── */
#loadingScreen{position:fixed;inset:0;background:var(--navy);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;}
.ld-icon{font-size:48px;animation:float 3s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.ld-name{color:var(--yellow);font-size:20px;font-weight:900;margin-top:8px;}

/* ── HEADER ─────────────────────────────────────────────────────── */
.hdr{background:var(--navy);height:56px;padding:0 20px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,0.25);}
.hdr-logo{color:var(--yellow);font-size:18px;font-weight:900;letter-spacing:-0.5px;text-decoration:none;cursor:pointer;}
.hdr-sep{color:rgba(255,255,255,0.25);font-size:14px;}
.hdr-title{color:rgba(255,255,255,0.75);font-size:14px;font-weight:700;}
.hdr-spacer{flex:1;}
.btn-hdr{background:none;border:1px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.65);font-size:12px;padding:5px 12px;border-radius:7px;cursor:pointer;font-family:inherit;transition:all 0.15s;white-space:nowrap;}
.btn-hdr:hover{border-color:rgba(255,255,255,0.5);color:white;}
.btn-hdr-back{background:rgba(255,255,255,0.07);}

/* ── PAGE ────────────────────────────────────────────────────────── */
#pageContent{display:none;}
.main{max-width:600px;margin:0 auto;padding:24px 16px 80px;}

/* ── SECTION CARD ────────────────────────────────────────────────── */
.sec-card{background:white;border-radius:16px;padding:22px 20px;margin-bottom:16px;box-shadow:0 1px 4px rgba(11,31,58,0.08);}
.sec-title{font-size:14px;font-weight:900;color:var(--navy);margin-bottom:18px;display:flex;align-items:center;gap:7px;}
.sec-title-sm{font-size:13px;font-weight:900;color:var(--navy);margin-bottom:14px;display:flex;align-items:center;gap:7px;}

/* ── FORM ────────────────────────────────────────────────────────── */
.field{margin-bottom:14px;}
.field label{display:block;font-size:12px;font-weight:700;color:var(--gray);margin-bottom:6px;letter-spacing:0.2px;}
.field input{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:11px 14px;font-size:14px;font-family:inherit;color:var(--text);background:#FAFBFF;outline:none;transition:border-color 0.15s;}
.field input:focus{border-color:var(--blue);}
.field input:disabled{background:var(--bg);color:var(--gray);cursor:default;}
.field-hint{font-size:11px;color:var(--text2);margin-top:5px;}
.divider{height:1px;background:var(--border);margin:20px 0;}

/* ── BUTTONS ─────────────────────────────────────────────────────── */
.btn-save{background:var(--navy);color:white;border:none;border-radius:10px;padding:12px 20px;font-size:14px;font-weight:900;font-family:inherit;cursor:pointer;transition:opacity 0.15s;position:relative;}
.btn-save:hover{opacity:0.88;}
.btn-save:disabled{opacity:0.5;cursor:default;}
.btn-save.loading::after{content:'';position:absolute;right:14px;top:50%;margin-top:-7px;width:14px;height:14px;border:2px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin 0.7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.btn-full{width:100%;}

/* ── SUBSCRIPTION ────────────────────────────────────────────────── */
.sub-box{background:var(--sky);border-radius:12px;padding:16px 18px;}
.sub-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.sub-plan-name{font-size:16px;font-weight:900;color:var(--navy);flex:1;}
.sub-badge{display:inline-flex;align-items:center;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:700;}
.sub-badge.free{background:var(--bg);color:var(--gray);}
.sub-badge.pro{background:#EDE7F6;color:#4527A0;}
.sub-expiry{font-size:12px;color:var(--text2);margin-top:10px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.sub-expiry-date{font-weight:700;color:var(--text);}
.sub-dday{font-size:12px;font-weight:900;padding:2px 9px;border-radius:6px;background:var(--green-lt);color:var(--green);}
.sub-dday.warn{background:var(--red-lt);color:var(--red);}
.sub-warn-text{font-size:12px;color:var(--red);font-weight:700;margin-top:10px;}
.sub-free-desc{font-size:13px;color:var(--text2);margin-top:10px;line-height:1.7;}

/* ── PRICING ─────────────────────────────────────────────────────── */
.custom-intro{font-size:13px;color:var(--text2);margin-bottom:16px;line-height:1.7;}
.price-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;}
.price-card{border:1.5px solid var(--border);border-radius:12px;padding:14px 10px;text-align:center;}
.price-tier{font-size:10px;font-weight:700;color:var(--gray);letter-spacing:0.5px;margin-bottom:7px;text-transform:uppercase;}
.price-name{font-size:12px;font-weight:900;color:var(--navy);margin-bottom:6px;line-height:1.35;}
.price-desc{font-size:10px;color:var(--text2);margin-bottom:10px;line-height:1.5;}
.price-amt{font-size:15px;font-weight:900;color:var(--blue);}
.price-unit{font-size:10px;color:var(--gray);margin-top:2px;}

/* ── KAKAO BUTTON ────────────────────────────────────────────────── */
.btn-kakao{display:flex;align-items:center;justify-content:center;gap:8px;background:#FEE500;color:#191919;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:900;font-family:inherit;cursor:pointer;width:100%;transition:all 0.15s;}
.btn-kakao:hover{background:#f0d800;}
.btn-kakao:active{transform:scale(0.98);}

/* ── WITHDRAW ────────────────────────────────────────────────────── */
.withdraw-row{text-align:center;margin-top:28px;padding-bottom:8px;}
.btn-withdraw{background:none;border:none;color:var(--gray);font-size:12px;font-family:inherit;cursor:pointer;text-decoration:underline;padding:4px 8px;}
.btn-withdraw:hover{color:var(--red);}

/* ── MODAL ──────────────────────────────────────────────────────── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.55);display:none;align-items:center;justify-content:center;z-index:300;padding:16px;}
.modal-bg.show{display:flex;}
.modal{background:white;border-radius:18px;padding:26px 24px;width:100%;max-width:360px;box-shadow:0 24px 64px rgba(0,0,0,0.3);}
.modal-title{font-size:17px;font-weight:900;color:var(--navy);margin-bottom:4px;}
.modal-sub{font-size:13px;color:var(--text2);margin-bottom:18px;line-height:1.6;}
.modal-warn{background:var(--red-lt);border-radius:10px;padding:12px 14px;margin-bottom:20px;}
.modal-warn p{font-size:12px;color:var(--red);line-height:1.7;}
.modal-btns{display:flex;gap:8px;}
.btn-cancel{flex:1;padding:12px;background:var(--bg);border:1.5px solid var(--border);color:var(--gray);border-radius:10px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;transition:background 0.15s;}
.btn-cancel:hover{background:#e2e8f0;}
.btn-ok{flex:1;padding:12px;background:var(--navy);color:white;border:none;border-radius:10px;font-size:14px;font-weight:900;font-family:inherit;cursor:pointer;position:relative;transition:opacity 0.15s;}
.btn-ok.danger{background:var(--red);}
.btn-ok:disabled{opacity:0.5;cursor:default;}
.btn-ok.loading::after{content:'';position:absolute;right:14px;top:50%;margin-top:-7px;width:14px;height:14px;border:2px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin 0.7s linear infinite;}

/* ── TOAST ──────────────────────────────────────────────────────── */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:var(--navy);color:white;font-size:13px;font-weight:700;padding:11px 22px;border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,0.3);display:none;z-index:500;white-space:nowrap;pointer-events:none;}
.toast.show{display:block;}
.toast.ok{background:var(--green);}
.toast.err{background:var(--red);}

/* ── RESPONSIVE ─────────────────────────────────────────────────── */
@media(max-width:480px){
  .hdr-sep,.hdr-title{display:none;}
  .main{padding:16px 12px 80px;}
  .price-grid{grid-template-columns:1fr;gap:8px;}
  .price-card{display:flex;align-items:center;gap:12px;text-align:left;padding:12px 14px;}
  .price-card > *{margin:0;}
  .price-card-right{display:flex;flex-direction:column;flex:1;}
  .price-tier{margin-bottom:2px;}
  .price-name{margin-bottom:2px;}
  .price-desc{margin-bottom:4px;}
}
@media(max-width:360px){
  .btn-hdr{font-size:11px;padding:5px 9px;}
}
</style>
</head>
<body>

<!-- ── LOADING ──────────────────────────────────────────────────── -->
<div id="loadingScreen">
  <div class="ld-icon">🥋</div>
  <div class="ld-name">FILLYO</div>
</div>

<!-- ── PAGE ─────────────────────────────────────────────────────── -->
<div id="pageContent">

  <header class="hdr">
    <span class="hdr-logo" onclick="location.href='/'">FILLYO</span>
    <span class="hdr-sep">›</span>
    <span class="hdr-title">마이페이지</span>
    <div class="hdr-spacer"></div>
    <button class="btn-hdr btn-hdr-back" onclick="location.href='/dashboard/'">← 대시보드</button>
    <button class="btn-hdr" onclick="doLogout()">로그아웃</button>
  </header>

  <main class="main">

    <!-- ── 학원 정보 ──────────────────────────────────────────────── -->
    <div class="sec-card">
      <div class="sec-title">🏫 학원 정보</div>
      <div class="field">
        <label>학원명</label>
        <input type="text" id="inputAcadName" placeholder="학원명을 입력해주세요">
      </div>
      <div class="field">
        <label>원장명</label>
        <input type="text" id="inputOwnerName" placeholder="원장님 이름을 입력해주세요">
      </div>
      <button class="btn-save btn-full" id="btnSaveAcad" onclick="saveAcademy()">저장</button>
    </div>

    <!-- ── 계정 정보 ──────────────────────────────────────────────── -->
    <div class="sec-card">
      <div class="sec-title">👤 계정 정보</div>
      <div class="field">
        <label>이메일</label>
        <input type="email" id="inputEmail" disabled>
        <div class="field-hint">이메일은 변경할 수 없습니다.</div>
      </div>

      <div class="divider"></div>

      <div class="sec-title-sm">🔐 비밀번호 변경</div>
      <div class="field">
        <label>현재 비밀번호</label>
        <input type="password" id="inputCurrentPw" placeholder="현재 비밀번호 입력">
      </div>
      <div class="field">
        <label>새 비밀번호 (6자 이상)</label>
        <input type="password" id="inputNewPw" placeholder="새 비밀번호 입력">
      </div>
      <div class="field">
        <label>새 비밀번호 확인</label>
        <input type="password" id="inputNewPw2" placeholder="새 비밀번호 재입력">
      </div>
      <button class="btn-save btn-full" id="btnChangePw" onclick="changePassword()">비밀번호 변경</button>
    </div>

    <!-- ── 구독 현황 ──────────────────────────────────────────────── -->
    <div class="sec-card">
      <div class="sec-title">💳 구독 현황</div>
      <div class="sub-box" id="subBox"><!-- JS로 채움 --></div>
    </div>

    <!-- ── 회원 탈퇴 ──────────────────────────────────────────────── -->
    <div class="withdraw-row">
      <button class="btn-withdraw" onclick="openWithdrawModal()">회원 탈퇴</button>
    </div>

  </main>
</div>

<!-- ── 탈퇴 확인 모달 ────────────────────────────────────────────── -->
<div class="modal-bg" id="withdrawModal">
  <div class="modal">
    <div class="modal-title">회원 탈퇴</div>
    <div class="modal-sub">정말 탈퇴하시겠습니까?<br>탈퇴 후에는 계정을 복구할 수 없습니다.</div>
    <div class="modal-warn">
      <p>⚠️ 이 작업은 <strong>되돌릴 수 없습니다.</strong><br>
      업무일지, 학원 설정 등 모든 데이터가 영구 삭제됩니다.</p>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeWithdrawModal()">취소</button>
      <button class="btn-ok danger" id="btnWithdrawOk" onclick="doWithdraw()">탈퇴하기</button>
    </div>
  </div>
</div>

<div id="contractDoc" style="position:fixed;top:-9999px;left:-9999px;width:794px;padding:60px;background:white;font-family:'Noto Sans KR',sans-serif;"></div>

<!-- ── TOAST ─────────────────────────────────────────────────────── -->
<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut,
         EmailAuthProvider, reauthenticateWithCredential, updatePassword, deleteUser }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getDatabase, ref, get, update, remove }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const FB_CONFIG = {
  apiKey:            "AIzaSyBL5lQr2VIPK9caokm90g4_eQIkA8EXjqE",
  authDomain:        "fillyo-journal.firebaseapp.com",
  projectId:         "fillyo-journal",
  storageBucket:     "fillyo-journal.firebasestorage.app",
  messagingSenderId: "594047356761",
  appId:             "1:594047356761:web:bfd402441d83eedf63c648",
  databaseURL:       "https://fillyo-journal-default-rtdb.asia-southeast1.firebasedatabase.app",
};

const app  = initializeApp(FB_CONFIG);
const auth = getAuth(app);
const db   = getDatabase(app);

let currentUser   = null;
let currentAcadId = null;

// ── 인증 체크 & 데이터 로드 ───────────────────────────────────────
onAuthStateChanged(auth, async (user) => {
  if (!user) {
    location.href = '/login/';
    return;
  }
  currentUser = user;
  document.getElementById('inputEmail').value = user.email;

  try {
    const snap = await get(ref(db, `users/${user.uid}`));
    if (!snap.exists()) { await signOut(auth); location.href = '/login/'; return; }

    const userData = snap.val();
    currentAcadId  = userData.academyId || null;

    if (currentAcadId) {
      const acSnap = await get(ref(db, `academies/${currentAcadId}/settings`));
      if (acSnap.exists()) {
        const s = acSnap.val();
        document.getElementById('inputAcadName').value  = s.academyName || s.name || '';
        document.getElementById('inputOwnerName').value = s.ownerName || userData.ownerName || '';
      }
    }

    renderSubBox(userData);
  } catch (e) {
    console.error(e);
  }

  document.getElementById('loadingScreen').style.display = 'none';
  document.getElementById('pageContent').style.display   = 'block';
});

// ── 구독 현황 렌더링 ──────────────────────────────────────────────
function renderSubBox(userData) {
  const el = document.getElementById('subBox');

  if (userData.role === 'admin') {
    el.innerHTML = `
      <div class="sub-row">
        <span class="sub-plan-name">🛡️ 운영자 계정</span>
        <span class="sub-badge pro">Admin</span>
      </div>
      <div class="sub-free-desc">모든 서비스를 이용할 수 있는 운영자 계정입니다.</div>
    `;
    return;
  }

  const planType    = userData.planType    || 'free';
  const planExpiry  = userData.planExpiry  || null;
  const billingCycle = userData.billingCycle || '';
  const hasContract = billingCycle === 'early' || billingCycle === 'yearly';
  const contractBtn = hasContract
    ? `<button onclick="downloadContractPDF()" style="margin-top:14px;width:100%;background:#0B1F3A;color:white;border:none;border-radius:8px;padding:10px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;letter-spacing:.2px;">📄 계약서 다운로드</button>`
    : '';

  if (planType === 'pro' && planExpiry) {
    const diff   = Math.ceil((planExpiry - Date.now()) / (1000 * 60 * 60 * 24));
    const warn   = diff <= 7;
    const ddayTxt = diff > 0 ? `D-${diff}` : '만료됨';
    el.innerHTML = `
      <div class="sub-row">
        <span class="sub-plan-name">⭐ Pro 플랜</span>
        <span class="sub-badge pro">유료 구독</span>
      </div>
      <div class="sub-expiry">
        <span class="sub-expiry-date">만료일 ${fmtDate(planExpiry)}</span>
        <span class="sub-dday${warn ? ' warn' : ''}">${ddayTxt}</span>
      </div>
      ${warn && diff > 0 ? `<div class="sub-warn-text">⚠️ 구독이 ${diff}일 후 만료됩니다. 갱신해주세요.</div>` : ''}
      ${contractBtn}
    `;
  } else if (planType === 'pro') {
    el.innerHTML = `
      <div class="sub-row">
        <span class="sub-plan-name">⭐ Pro 플랜</span>
        <span class="sub-badge pro">유료 구독</span>
      </div>
      <div class="sub-free-desc">구독 기간 정보가 없습니다.</div>
      ${contractBtn}
    `;
  } else {
    el.innerHTML = `
      <div class="sub-row">
        <span class="sub-plan-name">무료 플랜</span>
        <span class="sub-badge free">무료</span>
      </div>
      <div class="sub-free-desc">현재 무료 플랜을 사용 중입니다.<br>Pro 플랜으로 업그레이드하면 더 많은 기능을 이용할 수 있습니다.</div>
    `;
  }
}

// ── 학원 정보 저장 ────────────────────────────────────────────────
window.saveAcademy = async () => {
  const name      = document.getElementById('inputAcadName').value.trim();
  const ownerName = document.getElementById('inputOwnerName').value.trim();

  if (!name)      { showToast('학원명을 입력해주세요.', 'err'); return; }
  if (!currentAcadId) { showToast('학원 정보를 찾을 수 없습니다.', 'err'); return; }

  const btn = document.getElementById('btnSaveAcad');
  btn.disabled = true; btn.classList.add('loading');
  try {
    await update(ref(db, `academies/${currentAcadId}/settings`), { academyName: name, name, ownerName });
    await update(ref(db, `users/${currentUser.uid}`), { ownerName });
    showToast('학원 정보가 저장되었습니다.', 'ok');
  } catch (e) {
    console.error(e);
    showToast('저장 실패: ' + e.message, 'err');
  } finally {
    btn.disabled = false; btn.classList.remove('loading');
  }
};

// ── 비밀번호 변경 ─────────────────────────────────────────────────
window.changePassword = async () => {
  const currentPw = document.getElementById('inputCurrentPw').value;
  const newPw     = document.getElementById('inputNewPw').value;
  const newPw2    = document.getElementById('inputNewPw2').value;

  if (!currentPw)           { showToast('현재 비밀번호를 입력해주세요.', 'err'); return; }
  if (newPw.length < 6)     { showToast('새 비밀번호는 6자 이상이어야 합니다.', 'err'); return; }
  if (newPw !== newPw2)     { showToast('새 비밀번호가 일치하지 않습니다.', 'err'); return; }

  const btn = document.getElementById('btnChangePw');
  btn.disabled = true; btn.classList.add('loading');
  try {
    const cred = EmailAuthProvider.credential(currentUser.email, currentPw);
    await reauthenticateWithCredential(currentUser, cred);
    await updatePassword(currentUser, newPw);
    document.getElementById('inputCurrentPw').value = '';
    document.getElementById('inputNewPw').value     = '';
    document.getElementById('inputNewPw2').value    = '';
    showToast('비밀번호가 변경되었습니다.', 'ok');
  } catch (e) {
    const msg = (e.code === 'auth/wrong-password' || e.code === 'auth/invalid-credential')
      ? '현재 비밀번호가 올바르지 않습니다.'
      : ('변경 실패: ' + e.message);
    showToast(msg, 'err');
  } finally {
    btn.disabled = false; btn.classList.remove('loading');
  }
};

window.openWithdrawModal  = () => document.getElementById('withdrawModal').classList.add('show');
window.closeWithdrawModal = () => document.getElementById('withdrawModal').classList.remove('show');

window.doWithdraw = async () => {
  const btn = document.getElementById('btnWithdrawOk');
  btn.disabled = true; btn.classList.add('loading');
  try {
    const uid = currentUser.uid;
    if (currentAcadId) await remove(ref(db, `academies/${currentAcadId}`));
    await remove(ref(db, `users/${uid}`));
    await deleteUser(currentUser);
    location.href = '/login/';
  } catch (e) {
    console.error(e);
    const msg = e.code === 'auth/requires-recent-login'
      ? '보안을 위해 재로그인 후 다시 시도해주세요.'
      : ('탈퇴 실패: ' + e.message);
    showToast(msg, 'err');
    btn.disabled = false; btn.classList.remove('loading');
    closeWithdrawModal();
  }
};

// ── 유틸 ──────────────────────────────────────────────────────────
function fmtDate(ts) {
  const d = new Date(ts);
  const p = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}.${p(d.getMonth()+1)}.${p(d.getDate())}`;
}

let toastTimer;
function showToast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className   = `toast show${type ? ' ' + type : ''}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = 'toast'; }, 3000);
}

// ── 계약서 PDF 생성 ───────────────────────────────────────────────
async function generateContractPDF(data) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'mm', format: 'a4' });
  const el  = document.getElementById('contractDoc');
  el.innerHTML = buildContractHTML(data);

  const canvas = await window.html2canvas(el, { scale: 2, useCORS: true, logging: false });
  const img    = canvas.toDataURL('image/png');
  const pdfW   = doc.internal.pageSize.getWidth();
  const pdfH   = doc.internal.pageSize.getHeight();
  const imgH   = (canvas.height * pdfW) / canvas.width;

  let y = 0, rem = imgH;
  doc.addImage(img, 'PNG', 0, y, pdfW, imgH);
  rem -= pdfH;
  while (rem > 0) {
    y -= pdfH;
    doc.addPage();
    doc.addImage(img, 'PNG', 0, y, pdfW, imgH);
    rem -= pdfH;
  }

  el.innerHTML = '';
  doc.save(`FILLYO_계약서_${data.contractStartDate}.pdf`);
}

// ── 계약서 다운로드 (마이페이지) ──────────────────────────────────
window.downloadContractPDF = async function() {
  if (!currentAcadId) { showToast('학원 정보를 찾을 수 없습니다.', 'err'); return; }
  const btn = document.querySelector('button[onclick="downloadContractPDF()"]');
  if (btn) { btn.disabled = true; btn.textContent = '생성 중...'; }
  try {
    const snap = await get(ref(db, `academies/${currentAcadId}/contracts`));
    if (!snap.exists()) { showToast('저장된 계약서가 없습니다.', 'err'); return; }
    const latest = Object.values(snap.val()).sort((a, b) =>
      b.contractId.localeCompare(a.contractId)
    )[0];
    await generateContractPDF(latest);
  } catch(e) {
    console.error(e);
    showToast('계약서 불러오기에 실패했습니다.', 'err');
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = '📄 계약서 다운로드'; }
  }
};
