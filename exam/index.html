<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>태권도 심사 - FILLYO</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
:root {
  --navy:   #0B1F3A;
  --blue:   #1352A8;
  --sky:    #E8F1FF;
  --border: #DDE4EE;
  --bg:     #EEF2F8;
  --white:  #FFFFFF;
  --text:   #1A2433;
  --text2:  #6B7A8D;
  --red:    #DC2626;
  --green:  #16A34A;
  --radius: 12px;
  --tab-h:  64px;
  --hdr-h:  56px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); }
button { cursor: pointer; border: none; background: none; font-family: inherit; }

/* ── LOADING ── */
#loading {
  position: fixed; inset: 0; background: var(--navy);
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 16px; z-index: 9999;
}
#loading .spin {
  width: 40px; height: 40px;
  border: 4px solid rgba(255,255,255,0.2);
  border-top-color: #fff; border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
#loading .load-text { color: rgba(255,255,255,0.7); font-size: 14px; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── HEADER ── */
#header {
  position: fixed; top: 0; left: 0; right: 0; height: var(--hdr-h);
  background: var(--navy); color: #fff;
  display: flex; align-items: center; padding: 0 16px; gap: 12px;
  z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.2);
}
#headerTitle { flex: 1; font-size: 16px; font-weight: 700; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
.hdr-btn { background:rgba(255,255,255,0.15); border:1.5px solid rgba(255,255,255,0.4); color:white; font-size:20px; cursor:pointer; padding:4px 8px; border-radius:8px; margin-left:4px; font-weight:700; font-family:inherit; }
.hdr-btn:active { background:rgba(255,255,255,0.28); }
#hdrBtns { display:flex; gap:6px; }

/* ── MAIN ── */
#main { padding-top: var(--hdr-h); padding-bottom: var(--tab-h); min-height: 100dvh; }
.tab-content { display: none; }
.tab-content.active { display: block; }

/* ── BOTTOM TAB ── */
#tabBar {
  position: fixed; bottom: 0; left: 0; right: 0; height: var(--tab-h);
  background: var(--white); border-top: 1px solid var(--border);
  display: flex; z-index: 100; box-shadow: 0 -2px 8px rgba(0,0,0,0.06);
}
.tab-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 2px; font-size: 11px; color: var(--text2);
  padding: 8px 4px; transition: color 0.15s;
}
.tab-btn .tab-icon { font-size: 22px; line-height: 1; }
.tab-btn.active { color: var(--blue); }
.tab-btn.active .tab-label { font-weight: 700; }

/* ── STATS ── */
.stats-row { display: grid; grid-template-columns: repeat(6,1fr); gap: 6px; padding: 12px 16px 0; }
.stat-box { background: var(--white); border-radius: 10px; border: 1px solid var(--border); padding: 10px 4px; text-align: center; }
.stat-box .sv { font-size: 18px; font-weight: 700; color: var(--blue); }
.stat-box .sl { font-size: 10px; color: #64748b; margin-top: 2px; }

/* ── SEARCH / SORT ── */
.search-row { padding: 10px 16px 0; display: flex; gap: 8px; }
.search-input { flex: 1; padding: 10px 14px; border-radius: 10px; border: 1px solid var(--border); background: var(--white); font-size: 14px; font-family: inherit; outline: none; }
.sort-select, .filter-select { padding: 10px 12px; border-radius: 10px; border: 1px solid var(--border); background: var(--white); font-size: 13px; font-family: inherit; outline: none; color: var(--text); }

/* ── STUDENT CARDS ── */
#studentList { padding: 10px 16px 0; }
.student-card { background: var(--white); border-radius: var(--radius); border: 1px solid var(--border); padding: 14px 16px; display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
.student-info { flex: 1; }
.student-name { font-size: 15px; font-weight: 700; }
.student-meta { font-size: 12px; color: var(--text2); margin-top: 3px; }

/* ── BELT BADGE ── */
.belt-wrap       { display:inline-flex; flex-direction:column; align-items:center; vertical-align:middle; flex-shrink:0; }
.belt-strip      { position:relative; display:inline-block; width:72px; height:20px; border-radius:4px; overflow:hidden; }
.belt-strip-text { position:relative; z-index:1; display:flex; align-items:center; justify-content:center; height:100%; font-size:11px; font-weight:700; white-space:nowrap; overflow:hidden; }
.belt-label      { font-size:11px; color:#374151; margin-top:3px; white-space:nowrap; font-weight:500; line-height:1.2; }
.belt-stripe     { position:absolute; left:0; right:0; pointer-events:none; }

/* ── FAB ── */
#fab { position: fixed; right: 20px; bottom: calc(var(--tab-h) + 16px); width: 52px; height: 52px; border-radius: 50%; background: var(--blue); color: #fff; font-size: 28px; line-height: 52px; text-align: center; box-shadow: 0 4px 16px rgba(19,82,168,0.4); z-index: 99; }

/* ── MODAL ── */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; align-items: flex-end; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal-box { background: var(--white); border-radius: 20px 20px 0 0; width: 100%; max-width: 600px; max-height: 90dvh; overflow-y: auto; padding: 24px 20px 36px; }
.modal-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; }
.form-row { margin-bottom: 14px; }
.form-label { font-size: 13px; color: var(--text2); margin-bottom: 6px; display: block; }
.form-input, .form-select { width: 100%; padding: 12px 14px; border-radius: 10px; border: 1px solid var(--border); font-size: 14px; font-family: inherit; outline: none; background: var(--white); color: var(--text); }
.form-input:focus, .form-select:focus { border-color: var(--blue); }
.modal-btn-row { display: flex; gap: 10px; margin-top: 20px; }
.modal-btn { flex: 1; padding: 14px; border-radius: 12px; font-size: 15px; font-weight: 700; }
.modal-btn.primary { background: var(--blue); color: #fff; }
.modal-btn.danger  { background: var(--red);  color: #fff; }
.modal-btn.secondary { background: var(--bg); color: var(--text2); }

/* ── EXAM SETUP ── */
.section { padding: 16px; }
.card { background: var(--white); border-radius: var(--radius); border: 1px solid var(--border); padding: 16px; }
.student-check-list { border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin-top: 6px; max-height: 260px; overflow-y: auto; }
.check-all-row { display: flex; align-items: center; gap: 8px; padding: 9px 14px; background: var(--sky); border-bottom: 1px solid var(--border); }
.check-all-row label { font-size: 13px; font-weight: 700; cursor: pointer; }
.check-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-bottom: 1px solid var(--border); }
.check-item:last-child { border-bottom: none; }
.check-item label { flex: 1; font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 6px; }
.progress-card { display: flex; align-items: center; justify-content: space-between; }
.progress-card .pc-label { font-size: 13px; color: var(--text2); }
.progress-card .pc-title { font-size: 16px; font-weight: 700; margin-top: 2px; }

/* ── EXAM TABLE ── */
#examSection { padding: 0 16px 16px; }
.exam-group { margin-bottom: 20px; }
.exam-group-title { font-size: 13px; font-weight: 700; color: var(--text2); padding: 6px 12px; background: var(--sky); border-radius: 8px; margin-bottom: 8px; }
.exam-row { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 8px; overflow: hidden; }
.exam-row.done { background: #e0e0e0; border-color: #cccccc; }
.exam-row.done .exam-row-header,
.exam-row.done .exam-row-body { opacity: 0.5; }
.exam-row-header { display: flex; align-items: center; padding: 12px 14px; border-bottom: 1px solid var(--border); gap: 8px; flex-wrap: wrap; }
.exam-row-name { font-size: 15px; font-weight: 700; flex: 1; }
.exam-row-body { padding: 14px; }
.score-group { margin-bottom: 14px; }
.score-group-label { font-size: 12px; font-weight: 700; color: var(--text2); margin-bottom: 6px; }
.score-items { display: flex; flex-direction: column; gap: 7px; }
.score-item { display: flex; align-items: center; gap: 8px; }
.score-item-label { font-size: 12px; color: var(--text2); width: 90px; flex-shrink: 0; }
.score-btns { display: flex; gap: 4px; }
.score-btn { width: 34px; height: 34px; border-radius: 8px; border: 1px solid var(--border); font-size: 13px; font-weight: 700; background: var(--bg); color: var(--text2); transition: all 0.1s; }
.score-btn.on { background: var(--blue); color: #fff; border-color: var(--blue); }
.pf-row { display: flex; gap: 8px; margin: 12px 0 10px; }
.pf-btn { flex: 1; padding: 11px; border-radius: 10px; border: 2px solid var(--border); font-size: 14px; font-weight: 700; background: var(--bg); color: var(--text2); transition: all 0.15s; }
.pf-btn.pass.on { background: #DCFCE7; color: var(--green); border-color: var(--green); }
.pf-btn.fail.on { background: #FEE2E2; color: var(--red);   border-color: var(--red); }
.comment-input { width: 100%; padding: 10px 12px; border-radius: 8px; border: 1px solid var(--border); font-size: 13px; font-family: inherit; resize: none; height: 58px; outline: none; }
.save-btn { width: 100%; padding: 12px; background: var(--blue); color: #fff; border-radius: 10px; font-size: 14px; font-weight: 700; margin-top: 10px; }
.bulk-group-pass-btn { font-size: 11px; padding: 4px 10px; background: var(--green); color: #fff; border-radius: 8px; font-weight: 700; font-family: inherit; flex-shrink: 0; }
.bulk-all-pass-btn { width: 100%; padding: 12px; background: var(--green); color: #fff; border-radius: 10px; font-size: 14px; font-weight: 700; font-family: inherit; }

/* ── EXAM CHUNK TABLE (가로 배치) ── */
.exam-chunk-wrap { overflow-x: auto; padding: 0 16px 20px; }
.exam-chunk-table { display: flex; min-width: max-content; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; background: var(--white); }
.exam-col { display: flex; flex-direction: column; border-right: 1px solid var(--border); }
.exam-col:last-child { border-right: none; }
.exam-col-label { min-width: 110px; background: var(--bg); flex-shrink: 0; }
.exam-col-student { min-width: 180px; }
.exam-cell { display: flex; align-items: center; padding: 6px 8px; border-bottom: 1px solid var(--border); }
.exam-cell:last-child { border-bottom: none; }
.exam-cell-label { font-size: 12px; color: var(--text2); font-weight: 500; }
.exam-cell.row-header { height: 64px; background: var(--sky); flex-direction: column; justify-content: center; align-items: center; gap: 4px; }
.exam-cell.row-header.exam-cell-label { align-items: flex-start; font-size: 12px; font-weight: 700; }
.exam-cell.row-score { height: 46px; justify-content: center; }
.exam-cell.row-pf { height: 96px; justify-content: center; }
.exam-cell.row-comment { height: 82px; padding: 6px; align-items: stretch; }
.exam-cell.row-save { height: 50px; justify-content: center; }
.exam-chunk-table .score-btn { width: 30px; height: 30px; font-size: 11px; }
.exam-chunk-table .score-btns { gap: 3px; }
.exam-chunk-table .save-btn { margin: 0; }
.exam-col.done { opacity: 0.5; pointer-events: none; }
.exam-col.done .exam-cell { background: #e0e0e0 !important; }

/* ── STATUS TAB ── */
.filter-row { padding: 12px 16px 0; }
.status-table-wrap { padding: 12px 16px; overflow-x: auto; }
.status-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.status-table th { background: var(--navy); color: #fff; padding: 8px 6px; text-align: center; white-space: nowrap; }
.status-table td { padding: 8px 6px; text-align: center; border-bottom: 1px solid var(--border); white-space: nowrap; }
.status-table tr:hover td { background: var(--sky); }
.pass-badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 700; }
.pass-badge.pass { background: #DCFCE7; color: var(--green); }
.pass-badge.fail { background: #FEE2E2; color: var(--red); }
.pass-badge.none { background: var(--bg); color: var(--text2); }

/* ── PROMO MODAL ── */
.promo-item { background: var(--sky); border-radius: 12px; padding: 14px 16px; margin-bottom: 12px; }
.promo-name { font-weight: 700; font-size: 15px; margin-bottom: 8px; }
.promo-belts { display: flex; align-items: center; gap: 8px; font-size: 13px; }

/* ── TOAST ── */
#toast { position: fixed; bottom: calc(var(--tab-h) + 16px); left: 50%; transform: translateX(-50%) translateY(20px); background: #1A2433; color: #fff; padding: 10px 20px; border-radius: 24px; font-size: 14px; z-index: 999; opacity: 0; transition: all 0.25s; pointer-events: none; white-space: nowrap; }
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

.hidden { display: none !important; }
.empty-msg { text-align: center; padding: 40px 20px; color: var(--text2); font-size: 14px; }

/* ── GRADE CHART TAB ── */
#tab-grade { padding-bottom: 8px; }
.grade-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 8px; }
.grade-col { display: flex; flex-direction: column; gap: 8px; }
.grade-card { background: white; border-radius: 12px; padding: 0; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
.grade-card-header { padding: 10px 12px; display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 12px; }
.grade-card-row { padding: 8px 12px; border-bottom: 1px solid #f1f5f9; display: flex; flex-direction: column; gap: 2px; }
.grade-card-row:last-child { border-bottom: none; }
.grade-row-label { font-size: 11px; font-weight: 700; color: #374151; }
.grade-row-content { font-size: 11px; color: #64748b; }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>

<div id="loading">
  <div class="spin"></div>
  <div class="load-text">로딩 중...</div>
</div>

<!-- HEADER -->
<div id="header">
  <div id="headerTitle">승급심사</div>
  <div onclick="location.href='../dashboard/index.html'" style="position:absolute;left:50%;transform:translateX(-50%);cursor:pointer;font-size:20px;font-weight:900;color:#ffffff;letter-spacing:3px;text-shadow:0 0 10px rgba(255,255,255,0.8);border:2px solid rgba(255,255,255,0.6);padding:3px 12px;border-radius:8px;">FILLYO</div>
  <div id="hdrBtns">
    <button class="hdr-btn" onclick="location.href='../dashboard/index.html'">🏠</button>
    <button class="hdr-btn" id="btnLogout" onclick="doLogout()" style="font-size:13px;">로그아웃</button>
  </div>
</div>

<!-- MAIN -->
<div id="main">

  <!-- 수련생 탭 -->
  <div id="tab-students" class="tab-content">
    <div class="stats-row">
      <div class="stat-box"><div class="sv" id="statTotal">0</div><div class="sl">전체</div></div>
      <div class="stat-box"><div class="sv" id="statGeneral">0</div><div class="sl">유급자</div></div>
      <div class="stat-box"><div class="sv" id="stat1Dan">0</div><div class="sl">1품·단</div></div>
      <div class="stat-box"><div class="sv" id="stat2Dan">0</div><div class="sl">2품·단</div></div>
      <div class="stat-box"><div class="sv" id="stat3Dan">0</div><div class="sl">3품·단</div></div>
      <div class="stat-box"><div class="sv" id="stat4Dan">0</div><div class="sl">4품·단</div></div>
    </div>
    <div class="search-row">
      <input class="search-input" id="searchInput" type="text" placeholder="이름 검색..." oninput="renderStudentList()">
      <select class="sort-select" id="sortSelect" onchange="renderStudentList()">
        <option value="belt-high">띠 높은순</option>
        <option value="belt-low">띠 낮은순</option>
        <option value="name">이름순</option>
        <option value="age">나이순</option>
      </select>
    </div>
    <div style="padding:0 16px 8px;display:flex;justify-content:flex-end">
      <button style="background:#f0fdf4;color:#166534;border:1px solid #86efac;border-radius:8px;padding:8px 14px;font-size:13px;cursor:pointer;font-family:inherit" onclick="openExcelModal()">📥 엑셀 등록</button>
    </div>
    <div id="studentList"></div>
  </div>

  <!-- 심사 탭 -->
  <div id="tab-exam" class="tab-content">

    <!-- STEP 1: 회차 설정 -->
    <div id="examSetupSection" class="section">
      <div id="examSetupCard" class="card">
        <div class="form-row">
          <label class="form-label">심사일</label>
          <input class="form-input" id="examDate" type="date">
        </div>
        <div class="form-row">
          <label class="form-label">회차명</label>
          <input class="form-input" id="examRound" type="text" placeholder="예) 제1회 정기 심사">
        </div>
        <div class="form-row">
          <label class="form-label">수련생 선택</label>
          <div style="display:flex;justify-content:flex-end;margin-bottom:6px">
            <select class="sort-select" id="setupSortSelect" onchange="renderExamStudentChecks()">
              <option value="belt-high">띠 높은순</option>
              <option value="belt-low">띠 낮은순</option>
              <option value="name">이름순</option>
              <option value="age">나이순</option>
            </select>
          </div>
          <div class="student-check-list">
            <div class="check-all-row">
              <input type="checkbox" id="chkAll" onchange="toggleCheckAll(this)">
              <label for="chkAll">전체 선택</label>
            </div>
            <div id="examStudentChecks"></div>
          </div>
        </div>
        <button class="modal-btn primary" style="width:100%;margin-top:4px" onclick="registerSession()">회차 등록</button>
      </div>
    </div>

    <!-- STEP 2: 부별 심사 -->
    <div id="examStep2Section" class="hidden">
      <div class="section" style="padding-bottom:8px">
        <div id="examProgressCard" class="card">
          <div class="progress-card">
            <div>
              <div class="pc-label" id="examProgressLabel">심사 진행 중</div>
              <div class="pc-title" id="examProgressTitle"></div>
            </div>
            <button class="modal-btn secondary" style="flex:none;padding:8px 16px;font-size:13px" onclick="endSession()">회차 종료</button>
          </div>
        </div>
      </div>

      <!-- 대기 목록 -->
      <div id="examStep2ListSection">
        <div style="display:flex;justify-content:space-between;align-items:center;padding:0 16px 8px">
          <span style="font-size:13px;font-weight:700;color:var(--text2)">심사 대기</span>
          <select class="sort-select" id="step2SortSelect" onchange="renderStep2List()">
            <option value="belt">띠순</option>
            <option value="name">이름순</option>
            <option value="age">나이순</option>
          </select>
        </div>
        <div id="step2StudentList" style="padding:0 16px"></div>
        <div style="padding:8px 16px 16px">
          <button class="modal-btn primary" style="width:100%" onclick="startSubExam()">심사 시작</button>
        </div>
      </div>

      <!-- 채점 화면 이동 후 목록 복귀 버튼 -->
      <div id="examBackSection" class="hidden" style="padding:8px 16px 0">
        <button class="modal-btn secondary" style="width:100%;padding:10px;font-size:14px" onclick="backToStep2List()">← 목록으로</button>
      </div>

      <!-- 채점 행 -->
      <div id="examSection" class="hidden"></div>
    </div>

  </div>

  <!-- 급수표 탭 -->
  <div id="tab-grade" class="tab-content">
    <div id="gradeChartList"></div>
  </div>

  <!-- 현황 탭 -->
  <div id="tab-status" class="tab-content">
    <div style="display:flex;gap:8px;align-items:center;padding:12px 16px">
      <select id="statusFilter" onchange="renderStatusTable();toggleDeleteRoundBtn()" style="flex:1;background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:8px 12px;font-size:13px;font-family:inherit">
        <option value="">전체 회차</option>
      </select>
      <select id="statusSort" onchange="renderStatusTable()" style="width:120px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:8px 12px;font-size:13px;font-family:inherit">
        <option value="belt-high">띠 높은순</option>
        <option value="belt-low">띠 낮은순</option>
        <option value="name">이름순</option>
        <option value="age">나이순</option>
      </select>
      <button id="deleteRoundBtn" style="display:none;width:90px;background:#fee2e2;color:#dc2626;border:1px solid #fca5a5;border-radius:8px;padding:8px 12px;font-size:12px;cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0" onclick="deleteRound()">🗑️ 회차 삭제</button>
    </div>
    <div class="status-table-wrap">
      <table class="status-table">
        <thead>
          <tr>

    '주황띠':'#f97316', '주황검띠':'#f97316',
    '초록띠':'#16a34a', '초록검띠':'#16a34a',
    '파란띠':'#2563eb', '파란검띠':'#2563eb',
    '보라띠':'#7c3aed', '보라검띠':'#7c3aed',
    '밤띠':'#92400e',   '밤검띠':'#92400e',
    '빨간띠':'#dc2626',
    '1품단':'#1f2937',  '2품단':'#1f2937',  '3품단':'#1f2937',  '4품단':'#1f2937',
  };
  const BLACK_STRIPE = new Set(['흰검띠','노검띠','주황검띠','초록검띠','파란검띠','보라검띠','밤검띠']);
  const DAN_LIST     = ['1품단','2품단','3품단','4품단'];
  const DAN_POS      = {1:['50%'],2:['33%','67%'],3:['25%','50%','75%'],4:['20%','40%','60%','80%']};
  const LIGHT        = new Set(['흰띠','흰검띠']);
  const WHITE_BG     = new Set(['흰검띠']);

  const isDanGrade = grade && /^\d+단$/.test(grade);
  const danGradeN  = isDanGrade ? parseInt(grade) : 0;
  const isDanBelt  = DAN_LIST.includes(belt);

  // 배경
  let bgCss;
  if (belt === '1품단' && !isDanGrade) {
    bgCss = 'background:linear-gradient(to bottom,#1f2937 50%,#dc2626 50%)';
  } else {
    bgCss = `background:${BG[belt] || '#9ca3af'}`;
  }

  // 줄 / 장식
  let stripes = '';
  if (BLACK_STRIPE.has(belt)) {
    const stripeColor = WHITE_BG.has(belt) ? '#1f2937' : '#111111';
    stripes = `<span class="belt-stripe" style="top:50%;transform:translateY(-50%);height:3px;background:${stripeColor};border-radius:0"></span>`;
  } else if (isDanBelt && isDanGrade) {
    const pos = DAN_POS[Math.min(danGradeN, 4)] || ['50%'];
    stripes = pos.map(p =>
      `<span class="belt-stripe" style="top:${p};transform:translateY(-50%);height:2px;background:#fbbf24"></span>`
    ).join('');
  } else if (belt === '2품단') {
    stripes = `<span class="belt-stripe" style="top:50%;transform:translateY(-50%);height:3px;background:#dc2626"></span>`;
  } else if (belt === '4품단') {
    stripes = `<span style="position:absolute;right:3px;top:50%;transform:translateY(-50%);font-size:10px;line-height:1;z-index:2">⭐</span>`;
  }

  const textColor = belt === '흰검띠' ? '#1f2937' : (LIGHT.has(belt) ? '#374151' : '#ffffff');
  const tShadow   = LIGHT.has(belt) ? 'none'    : '0 1px 2px rgba(0,0,0,0.5)';
  const shortLabel = grade || belt;
  const fullLabel  = belt + (grade ? ' ' + grade : '');

  const borderStyle = belt === '흰검띠' ? ';border:2px solid #9ca3af' : '';
  return (
    `<span class="belt-wrap" title="${fullLabel}">` +
      `<span class="belt-strip" style="${bgCss}${borderStyle}">` +
        stripes +
        `<span class="belt-strip-text" style="color:${textColor};text-shadow:${tShadow}">${shortLabel}</span>` +
      `</span>` +
    `</span>`
  );
}

function avgScore(arr) {

  if (!valid.length) return '-';
  return (valid.reduce((a, b) => a + b, 0) / valid.length).toFixed(1);
}

}

const BELT_ORDER_LIST = [...BELTS_JUNIOR, ...DAN_BELTS];
function beltOrder(belt) {
  const i = BELT_ORDER_LIST.indexOf(belt);
  return i === -1 ? 99 : i;
}
function gradeNum(grade) {
  const m = String(grade||'').match(/\d+/);
  return m ? Number(m[0]) : 0;
}
function applySort(list, sort) {
  if (sort === 'belt-high' || sort === 'belt') list.sort((a, b) =>
    beltOrder(b.belt) - beltOrder(a.belt) ||
    (gradeNum(a.grade)||999) - (gradeNum(b.grade)||999)
  );
  else if (sort === 'belt-low') list.sort((a, b) =>
    beltOrder(a.belt) - beltOrder(b.belt) ||
    gradeNum(b.grade) - gradeNum(a.grade)
  );
  else if (sort === 'name') list.sort((a, b) => (a.name||'').localeCompare(b.name||''));
  else if (sort === 'age')  list.sort((a, b) => (Number(a.age)||0) - (Number(b.age)||0));
  return list;
}

window.importExcelStudents = async () => {
  if (typeof XLSX === 'undefined') { showToast('⚠️ 라이브러리 로딩 중, 잠시 후 다시 시도해주세요'); return; }
  const file = document.getElementById('excelFileInput').files[0];
  if (!file) { showToast('파일을 선택해주세요'); return; }
  const validBelts = new Set(ALL_BELTS);
  const reader = new FileReader();
  reader.onload = async (ev) => {
    try {
      const wb   = XLSX.read(ev.target.result, { type: 'array' });
      const ws   = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
      let added = 0, skipped = 0;
      for (let i = 1; i < rows.length; i++) {
        const [rName, rBelt, rGrade, rAge, rSchool, rMemo] = rows[i];
        const nameStr = String(rName||'').trim();
        const beltStr = String(rBelt||'').trim();
        if (!nameStr || !beltStr || !validBelts.has(beltStr)) { skipped++; continue; }
        const isDuplicate = Object.values(students).some(
          s => String(s.name||'').trim() === nameStr && String(s.belt||'').trim() === beltStr
        );
        if (isDuplicate) { skipped++; continue; }
        const newKey = push(ref(db, `academies/${academyId}/exam/students`)).key;
        await set(ref(db, `academies/${academyId}/exam/students/${newKey}`), {
          name:      nameStr,
          belt:      beltStr,
          grade:     (() => { const s = String(rGrade??'').trim(); if (!s) return 0; const n = Number(s); if (!isNaN(n)) return n; const m = s.match(/\d+/); return m ? Number(m[0]) : s; })(),
          age:       Number(rAge)||0,
          school:    String(rSchool||'').trim(),
          memo:      String(rMemo||'').trim(),
          createdAt: Date.now(),
        });
        added++;
      }
      closeModal('modalExcel');
      showToast(`✅ ${added}명 등록 완료, ${skipped}명 건너뜀`);
    } catch (err) {
      console.error(err);
      showToast('⚠️ 파일 처리 중 오류가 발생했습니다');
    }
  };
  reader.readAsArrayBuffer(file);
};

// ── 심사 탭 ──────────────────────────────────────────────────────────
window.renderExamStudentChecks = () => {
  const sort = document.getElementById('setupSortSelect')?.value || 'belt';
  let list = Object.entries(students).map(([id, s]) => ({ id, ...s }));
  applySort(list, sort);
  document.getElementById('examStudentChecks').innerHTML = list.map(s => `
    <div class="check-item">
      <input type="checkbox" id="chk-${s.id}" value="${s.id}">
      <label for="chk-${s.id}">${s.name || '이름없음'} ${beltBadge(s.belt || '흰띠', s.grade || '')}</label>
    </div>
  `).join('');
};

window.toggleCheckAll = (chk) => {
  document.querySelectorAll('#examStudentChecks input[type=checkbox]').forEach(c => c.checked = chk.checked);
};

window.toggleCheckAllStep2 = (chk) => {
  document.querySelectorAll('.step2-chk').forEach(c => c.checked = chk.checked);
};

function sortList(list, sort) { return applySort(list, sort); }

function isStudentDoneInSession(studentId) {
  if (!currentSession) return false;
  return Object.values(evaluations).some(
    e => e.studentId === studentId && e.date === currentSession.date && e.round === currentSession.round
  );
}

window.renderStep2List = () => {
  if (!currentSession) return;
  const sort   = document.getElementById('step2SortSelect')?.value || 'belt';
  const allIds = currentSession.studentIds || [];
  const sortedStudents = [...allIds].sort((a, b) => {
    const aDone = isStudentDoneInSession(a) ? 1 : 0;
    const bDone = isStudentDoneInSession(b) ? 1 : 0;
    return aDone - bDone;
  });
  const pending = [], done = [];
  sortedStudents.forEach(id => {
    const s = students[id];
    if (!s) return;
    (isStudentDoneInSession(id) ? done : pending).push({ id, ...s });
  });
  sortList(pending, sort);
  sortList(done, sort);

  let html = `
    <div class="student-check-list" style="margin-bottom:12px">
      <div class="check-all-row">
        <input type="checkbox" id="chkAllStep2" onchange="toggleCheckAllStep2(this)">
        <label for="chkAllStep2">전체 선택 (${pending.length}명)</label>
      </div>
      ${pending.map(s => `
        <div class="check-item">
          <input type="checkbox" class="step2-chk" id="step2chk-${s.id}" value="${s.id}">
          <label for="step2chk-${s.id}">${s.name || '이름없음'} ${beltBadge(s.belt || '흰띠', s.grade || '')}</label>
        </div>
      `).join('')}
      ${!pending.length ? '<div class="empty-msg" style="padding:20px">모든 수련생 심사 완료</div>' : ''}
    </div>
  `;
  if (done.length) {
    html += `
      <div style="font-size:12px;font-weight:700;color:var(--text2);margin-bottom:6px;padding-left:2px">완료 (${done.length}명)</div>
      <div class="student-check-list">
        ${done.map(s => `
          <div class="check-item" style="background:#f0f0f0;opacity:0.65;pointer-events:none">
            <span style="font-size:14px">✅</span>
            <span style="flex:1;font-size:14px;display:flex;align-items:center;gap:6px">${s.name || '이름없음'} ${beltBadge(s.belt || '흰띠', s.grade || '')}</span>
          </div>
        `).join('')}
      </div>
    `;
  }
  document.getElementById('step2StudentList').innerHTML = html;
};

function showStep1() {
  document.getElementById('examSetupSection').classList.remove('hidden');
  document.getElementById('examStep2Section').classList.add('hidden');
  document.getElementById('examSection').classList.add('hidden');
  document.getElementById('examSection').innerHTML = '';
}

function showStep2() {
  document.getElementById('examSetupSection').classList.add('hidden');
  document.getElementById('examStep2Section').classList.remove('hidden');
  document.getElementById('examProgressTitle').textContent = `${currentSession.date} | ${currentSession.round}`;
  document.getElementById('examProgressLabel').textContent = `${(currentSession.studentIds || []).length}명 등록됨`;
  document.getElementById('examStep2ListSection').classList.remove('hidden');
  document.getElementById('examBackSection').classList.add('hidden');
  document.getElementById('examSection').classList.add('hidden');

window.registerSession = async () => {
  const date  = document.getElementById('examDate').value;
  const round = document.getElementById('examRound').value.trim();
  if (!date)  { showToast('심사일을 선택해주세요'); return; }
  if (!round) { showToast('회차명을 입력해주세요'); return; }
  const checked = [...document.querySelectorAll('#examStudentChecks input:checked')].map(c => c.value);
  if (!checked.length) { showToast('수련생을 선택해주세요'); return; }

  const sessionData = { date, round, studentIds: checked, createdAt: Date.now() };
  const sessionKey  = push(ref(db, `academies/${academyId}/exam/sessions`)).key;
  await set(ref(db, `academies/${academyId}/exam/sessions/${sessionKey}`), sessionData);

  currentSession = { key: sessionKey, ...sessionData };
  showStep2();
  showToast('✅ 회차 등록 완료');
};

window.startSubExam = () => {
  if (!currentSession) return;
  const checked = [...document.querySelectorAll('.step2-chk:checked')].map(c => c.value);
  if (!checked.length) { showToast('수련생을 선택해주세요'); return; }

  const cur = CURRICULUM['흰띠'];
  const sessionStudents = checked.map(id => {
    const s   = students[id] || {};
    const crr = CURRICULUM[s.belt] || cur;
    return {
      id,
      name:    s.name  || '',
      belt:    s.belt  || '흰띠',
      grade:   s.grade || '',
      scores:  {
        poomsae:   [0, 0],
        kick:      [0, 0, 0],
        extreme:   (crr.extreme || []).map(() => 0),
        character: [0, 0, 0],
      },
      passed:  null,
      comment: '',
      done:    false,
    };
  });

  currentExamSession = { date: currentSession.date, round: currentSession.round, students: sessionStudents };
  document.getElementById('examStep2ListSection').classList.add('hidden');
  document.getElementById('examBackSection').classList.remove('hidden');
  document.getElementById('examSection').classList.remove('hidden');
  renderExamTable();
};

window.backToStep2List = () => {
  currentExamSession = null;
  document.getElementById('examSection').classList.add('hidden');
  document.getElementById('examSection').innerHTML = '';
  document.getElementById('examBackSection').classList.add('hidden');
  document.getElementById('examStep2ListSection').classList.remove('hidden');
  renderStep2List();
};

window.endSession = async () => {
  if (!confirm('회차를 종료하시겠습니까?')) return;
  if (currentSession) {
    await remove(ref(db, `academies/${academyId}/exam/sessions/${currentSession.key}`));
  }
  currentSession     = null;
  currentExamSession = null;
  showStep1();
};

function renderExamTable() {
  const sec = document.getElementById('examSection');
  if (!currentExamSession) { sec.innerHTML = ''; return; }

  const groups = {};
  currentExamSession.students.forEach((ss, idx) => {
    if (!groups[ss.belt]) groups[ss.belt] = [];
    groups[ss.belt].push({ ss, idx });
  });

  let html = `<div style="padding:8px 16px 4px;display:flex;justify-content:flex-end">
    <button style="background:#dc2626;color:white;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:700;border:none;cursor:pointer;font-family:inherit" onclick="bulkPassAll()">🏆 전체 일괄합격</button>
  </div>`;
  Object.entries(groups).forEach(([belt, items]) => {
    for (let i = 0; i < items.length; i += 4) {
      const chunk   = items.slice(i, i + 4);
      const isFirst = (i === 0);
      html += buildBeltChunkTable(belt, chunk.map(c => c.ss), chunk.map(c => c.idx), isFirst);
    }
  });
  sec.innerHTML = html + `
    <div style="padding:0 16px 4px">
      <button style="display:block;width:100%;padding:12px;background:#22c55e;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit" onclick="bulkPassAll()">✅ 전체 합격 처리</button>
    </div>
    <div style="padding:0 16px 16px">
      <button style="display:block;width:100%;padding:12px;background:#f1f5f9;color:#475569;border:none;border-radius:8px;font-size:14px;cursor:pointer;font-family:inherit" onclick="backToStep2List()">← 목록으로</button>
    </div>
    <div id="examDoneSection"></div>
  `;
}

function buildBeltChunkTable(belt, chunkStudents, chunkIndices, isFirst) {
  const crr = CURRICULUM[belt] || CURRICULUM['흰띠'];

  const scoreRows = [
    { key: 'poomsae',   label: '품새 정확도',   i: 0 },
    { key: 'poomsae',   label: '품새 완성도',   i: 1 },
    { key: 'kick',      label: '발차기 완성도', i: 0 },
    { key: 'kick',      label: '발차기 공방',   i: 1 },
    { key: 'kick',      label: '발차기 다양성', i: 2 },
    ...crr.extreme.map((name, ei) => ({ key: 'extreme', label: name, i: ei })),
    { key: 'character', label: '인성 태도',     i: 0 },
    { key: 'character', label: '인성 집중력',   i: 1 },
    { key: 'character', label: '인성 교재',     i: 2 },
  ];

  const labelCol = `
    <div class="exam-col exam-col-label">
      <div class="exam-cell row-header exam-cell-label">항목</div>
      ${scoreRows.map(r => `<div class="exam-cell row-score exam-cell-label">${r.label}</div>`).join('')}
      <div class="exam-cell row-pf exam-cell-label">합격여부</div>
      <div class="exam-cell row-comment exam-cell-label">한줄평</div>
      <div class="exam-cell row-save exam-cell-label"></div>
    </div>
  `;

  const studentCols = chunkStudents.map((ss, ci) => {
    const idx = chunkIndices[ci];
    const scoreCells = scoreRows.map(r => {
      const val = (ss.scores[r.key] || [])[r.i] || 0;
      return `<div class="exam-cell row-score"><div class="score-btns">${
        [1,2,3,4,5].map(v =>
          `<button class="score-btn${val === v ? ' on' : ''}" onclick="setScore(${idx},'${r.key}',${r.i},${v},this)">${v}</button>`
        ).join('')
      }</div></div>`;
    }).join('');

    return `
      <div class="exam-col exam-col-student${ss.done ? ' done' : ''}" id="erow-${idx}">
        <div class="exam-cell row-header exam-cell-header">
          <div style="font-size:14px;font-weight:700">${ss.name}</div>
          ${beltBadge(ss.belt, ss.grade)}
          ${ss.done ? '<span style="font-size:12px;color:var(--green)">✅ 완료</span>' : ''}
        </div>
        ${scoreCells}
        <div class="exam-cell row-pf">
          <div style="display:flex;flex-direction:column;gap:6px;width:100%">
            <button class="pf-btn pass${ss.passed === true  ? ' on' : ''}" onclick="setPassed(${idx},true)">✅ 합격</button>
            <button class="pf-btn fail${ss.passed === false ? ' on' : ''}" onclick="setPassed(${idx},false)">❌ 불합격</button>
          </div>
        </div>
        <div class="exam-cell row-comment">
          <textarea class="comment-input" id="comment-${idx}" placeholder="한줄평..." style="height:100%;resize:none">${ss.comment || ''}</textarea>
        </div>
        <div class="exam-cell row-save">
          <button class="save-btn" style="margin:0" onclick="saveExamRow(${idx})">💾 저장</button>
        </div>
      </div>
    `;
  }).join('');

  const groupHeader = isFirst ? `
    <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px">
      <span style="display:flex;align-items:center;gap:6px;font-size:13px;font-weight:700;color:var(--text2)">${beltBadge(belt, '')} ${belt}</span>
      <button style="font-size:12px;padding:5px 12px;background:#22c55e;color:#fff;border:none;border-radius:6px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap" onclick="bulkPassGroup('${belt}')">✅ 이 부 전체 합격</button>
    </div>
  ` : '';
  return `
    <div class="exam-chunk-wrap">
      ${groupHeader}
      <div class="exam-chunk-table">
        ${labelCol}
        ${studentCols}
      </div>
    </div>
  `;
}

function moveRowToDone(idx) {
  const colEl = document.getElementById('erow-' + idx);
  if (colEl) colEl.classList.add('done');
}

window.setScore = (idx, key, i, val, btn) => {
  currentExamSession.students[idx].scores[key][i] = val;
  btn.parentElement.querySelectorAll('.score-btn').forEach((b, bi) => b.classList.toggle('on', bi + 1 === val));
};

window.setPassed = (idx, val) => {
  const ss = currentExamSession.students[idx];
  ss.passed = val;
  const row = document.getElementById('erow-' + idx);
  row.querySelectorAll('.pf-btn.pass').forEach(b => b.classList.toggle('on', val === true));
  row.querySelectorAll('.pf-btn.fail').forEach(b => b.classList.toggle('on', val === false));
};

window.saveExamRow = async (idx) => {
  const ss = currentExamSession.students[idx];
  ss.comment = document.getElementById('comment-' + idx)?.value || '';

  const hasAny = [...ss.scores.poomsae, ...ss.scores.kick, ...ss.scores.extreme, ...ss.scores.character].some(v => v > 0);
  if (!hasAny && !ss.comment && ss.passed === null) { showToast('⚠️ 입력된 내용이 없습니다'); return; }
  if (ss.passed === null) { showToast('합격 여부를 선택해주세요'); return; }

  const evalData = {
    studentId: ss.id,
    date:      currentExamSession.date,
    round:     currentExamSession.round,
    belt:      ss.belt,
    grade:     ss.grade || '',
    passed:    ss.passed,
    scores:    ss.scores,
    comment:   ss.comment,
  };
  const existingEntry = Object.entries(evaluations).find(
    ([, e]) => e.studentId === ss.id && e.date === currentExamSession.date && e.round === currentExamSession.round
  );
  const evalId = existingEntry ? existingEntry[0] : push(ref(db, `academies/${academyId}/exam/evaluations`)).key;
  await set(ref(db, `academies/${academyId}/exam/evaluations/${evalId}`), evalData);

  ss.done = true;
  const rowEl = document.getElementById('erow-' + idx);
  if (rowEl) rowEl.classList.add('done');
  moveRowToDone(idx);
  showToast('✅ 저장 완료!');

  // 합격이면 승급 팝업 먼저 표시
  if (ss.passed === true) {
    const next = calcNext(ss);
    if (next) {
      pendingPromotion = { ss, stId: ss.id, nextBelt: next.nextBelt, nextGrade: next.nextGrade };
      showPromotionModal(pendingPromotion);
    }
  }

  // 저장 후 목록으로 이동 (승급 팝업이 열려 있으면 팝업 위로 목록이 보임)
  backToStep2List();
};

function showPromotionModal(promo) {
  document.getElementById('promoContent').innerHTML = `
    <div class="promo-item">
      <div class="promo-name">${promo.ss.name}</div>
      <div class="promo-belts">
        ${beltBadge(promo.ss.belt, promo.ss.grade || '')}
        <span style="color:var(--text2)">→</span>
        ${beltBadge(promo.nextBelt, promo.nextGrade || '')}
      </div>
    </div>
    <p style="font-size:13px;color:var(--text2)">승급을 적용하시겠습니까?</p>
  `;
  openModal('modalPromotion');
}

window.applyPromotion = async () => {
  if (!pendingPromotion) return;
  const { stId, nextBelt, nextGrade } = pendingPromotion;
  const updateData = { belt: nextBelt, grade: nextGrade || '' };
  if (isDan(nextBelt)) {
    const certKey = `certDate${DAN_BELTS.indexOf(nextBelt) + 1}`;
    updateData[certKey] = todayStr();
  }
  await update(ref(db, `academies/${academyId}/exam/students/${stId}`), updateData);
  closeModal('modalPromotion');
  showToast('🏆 승급 적용 완료!');
  pendingPromotion = null;
};

window.cancelPromotion = () => {
  closeModal('modalPromotion');
  pendingPromotion = null;
};

// ── 일괄합격 처리 ──────────────────────────────────────────────────────
async function bulkPassStudents(indices) {
  for (const idx of indices) {
    const ss = currentExamSession.students[idx];
    if (ss.done) continue;

    const evalData = {
      studentId: ss.id,
      date:      currentExamSession.date,
      round:     currentExamSession.round,
      belt:      ss.belt,
      grade:     ss.grade || '',
      passed:    true,
      scores:    ss.scores,
      comment:   '',
    };
    const existingEntry = Object.entries(evaluations).find(
      ([, e]) => e.studentId === ss.id && e.date === currentExamSession.date && e.round === currentExamSession.round
    );
    const evalId = existingEntry ? existingEntry[0] : push(ref(db, `academies/${academyId}/exam/evaluations`)).key;
    await set(ref(db, `academies/${academyId}/exam/evaluations/${evalId}`), evalData);

    const next = calcNext(ss);
    if (next) {
      const updateData = { belt: next.nextBelt, grade: next.nextGrade || '' };
      if (isDan(next.nextBelt)) {
        const certKey = `certDate${DAN_BELTS.indexOf(next.nextBelt) + 1}`;
        updateData[certKey] = todayStr();
      }
      await update(ref(db, `academies/${academyId}/exam/students/${ss.id}`), updateData);
    }

    ss.done   = true;
    ss.passed = true;
    const rowEl = document.getElementById('erow-' + idx);
    if (rowEl) rowEl.classList.add('done');
  }
  showToast('전체 합격 처리 완료!', 'ok');
}

window.bulkPassGroup = async (belt) => {
  if (!currentExamSession) return;
  if (!confirm(`${belt} 전체 학생을 합격 처리합니다. 계속할까요?`)) return;
  const indices = currentExamSession.students
    .map((ss, idx) => ({ ss, idx }))
    .filter(({ ss }) => ss.belt === belt && !ss.done)
    .map(({ idx }) => idx);
  if (!indices.length) { showToast('해당 부에 미완료 학생이 없습니다'); return; }
  await bulkPassStudents(indices);
  const remaining = currentExamSession.students.filter(ss => !ss.done).length;
  showToast(remaining === 0 ? '🎉 이번 심사 완료!' : `✅ ${belt} 전체 합격 처리 완료`);
};

window.bulkPassAll = async () => {
  if (!currentExamSession) return;
  if (!confirm('현재 심사 중인 전체 학생을 합격 처리합니다. 계속할까요?')) return;
  const indices = currentExamSession.students
    .map((ss, idx) => ({ ss, idx }))
    .filter(({ ss }) => !ss.done)
    .map(({ idx }) => idx);
  if (!indices.length) { showToast('미완료 학생이 없습니다'); return; }
  await bulkPassStudents(indices);
  showToast('🎉 이번 심사 완료!');
  backToStep2List();
};

// ── 현황 탭 ──────────────────────────────────────────────────────────
function updateStatusFilter() {
  const rounds = [...new Set(Object.values(evaluations).map(e => e.round))].filter(Boolean).sort();
  const sel = document.getElementById('statusFilter');
  const cur = sel.value;
  sel.innerHTML = '<option value="">전체 회차</option>' +
    rounds.map(r => `<option value="${r}"${r === cur ? ' selected' : ''}>${r}</option>`).join('');
  toggleDeleteRoundBtn();
}

window.renderStatusTable = () => {
  const filter = document.getElementById('statusFilter').value;
  const sort   = document.getElementById('statusSort').value;
  let entries = Object.entries(evaluations);
  if (filter) entries = entries.filter(([, e]) => e.round === filter);
  if (sort === 'belt-high')    entries.sort(([, a], [, b]) => beltOrder(b.belt) - beltOrder(a.belt) || (gradeNum(a.grade)||999) - (gradeNum(b.grade)||999));
  else if (sort === 'belt-low') entries.sort(([, a], [, b]) => beltOrder(a.belt) - beltOrder(b.belt) || gradeNum(b.grade) - gradeNum(a.grade));
  else if (sort === 'name')    entries.sort(([, a], [, b]) => (students[a.studentId]?.name||'').localeCompare(students[b.studentId]?.name||''));
  else if (sort === 'age')     entries.sort(([, a], [, b]) => (Number(students[a.studentId]?.age)||0) - (Number(students[b.studentId]?.age)||0));
  else                         entries.sort(([, a], [, b]) => (b.date||'').localeCompare(a.date||'') || (a.round||'').localeCompare(b.round||''));

  const tbody = document.getElementById('statusBody');
  if (!entries.length) {
    tbody.innerHTML = '<tr><td colspan="11" class="empty-msg">기록 없음</td></tr>';
    return;
  }

  tbody.innerHTML = entries.map(([evalId, e]) => {
    const st   = students[e.studentId];
    const name = st?.name || '-';
    const passedBadge = e.passed === true
      ? '<span class="pass-badge pass">합격</span>'
      : e.passed === false
        ? '<span class="pass-badge fail">불합격</span>'
        : '<span class="pass-badge none">-</span>';
    const tempSs = { id: e.studentId, belt: e.belt, grade: e.grade || '', scores: e.scores, passed: e.passed };
    let resultCell = '-';
    if (e.passed === true) {
      const next = calcNext(tempSs);
      resultCell = next
        ? `${beltBadge(e.belt || '', e.grade || '')} → ${beltBadge(next.nextBelt, next.nextGrade || '')}`
        : beltBadge(e.belt || '', e.grade || '');
    } else if (e.passed === false) {
      resultCell = `${beltBadge(e.belt || '', e.grade || '')} <span style="font-size:11px;color:var(--text2)">(유지)</span>`;
    }
    return `
      <tr>
        <td>${name}</td>
        <td>${e.date || '-'}</td>
        <td>${e.round || '-'}</td>
        <td>${beltBadge(e.belt || '', e.grade || '')}</td>
        <td>${avgScore(e.scores?.poomsae)}</td>
        <td>${avgScore(e.scores?.kick)}</td>
        <td>${avgScore(e.scores?.extreme)}</td>

window.toggleDeleteRoundBtn = () => {

  if (btn) btn.style.display = round ? 'block' : 'none';
};

window.deleteRound = async () => {
  const round = document.getElementById('statusFilter').value;
  if (!round) return;
  if (!confirm(`"${round}" 회차의 모든 심사 기록을 삭제합니다. 되돌릴 수 없습니다. 계속할까요?`)) return;
  const toDelete = Object.entries(evaluations).filter(([, e]) => e.round === round);
  for (const [evalId] of toDelete) {
    await remove(ref(db, `academies/${academyId}/exam/evaluations/${evalId}`));
  }
  showToast('✅ 회차 기록이 삭제되었습니다');
};

window.editEvalRecord = (evalId) => {
  const e = evaluations[evalId];
  if (!e) return;
  editingEvalId = evalId;
  const crr = CURRICULUM[e.belt] || CURRICULUM['흰띠'];
  const scoreRows = [
    { key:'poomsae',   label:'품새 정확도',   i:0 },
    { key:'poomsae',   label:'품새 완성도',   i:1 },
    { key:'kick',      label:'발차기 완성도', i:0 },
    { key:'kick',      label:'발차기 공방',   i:1 },
    { key:'kick',      label:'발차기 다양성', i:2 },
    ...(crr.extreme||[]).map((nm,ei) => ({ key:'extreme', label:nm, i:ei })),
    { key:'character', label:'인성 태도',     i:0 },
    { key:'character', label:'인성 집중력',   i:1 },
    { key:'character', label:'인성 교재',     i:2 },
  ];
  _editScores = JSON.parse(JSON.stringify(e.scores || { poomsae:[0,0], kick:[0,0,0], extreme:[], character:[0,0,0] }));
  _editPassed = e.passed;
  document.getElementById('evalEditContent').innerHTML = `
    <div style="margin-bottom:14px">
      ${scoreRows.map(r => {
        const val = (_editScores[r.key]||[])[r.i] || 0;
        return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
          <span style="font-size:12px;color:var(--text2);width:100px;flex-shrink:0">${r.label}</span>
          <div style="display:flex;gap:3px">
            ${[1,2,3,4,5].map(v=>`<button type="button" class="score-btn${val===v?' on':''}" onclick="editScoreClick(this,'${r.key}',${r.i},${v})">${v}</button>`).join('')}
          </div>
        </div>`;
      }).join('')}
    </div>
    <div style="display:flex;gap:8px;margin-bottom:12px">
      <button type="button" class="pf-btn pass${e.passed===true?' on':''}" onclick="editSetPassed(true)" id="editPfPass">✅ 합격</button>
      <button type="button" class="pf-btn fail${e.passed===false?' on':''}" onclick="editSetPassed(false)" id="editPfFail">❌ 불합격</button>
    </div>
    <div>
      <label class="form-label">한줄평</label>
      <textarea class="comment-input" id="editComment" style="height:70px">${e.comment||''}</textarea>
    </div>
  `;
  openModal('modalEvalEdit');
};

window.editScoreClick = (btn, key, i, val) => {
  if (!_editScores[key]) _editScores[key] = [];
  _editScores[key][i] = val;
  btn.parentElement.querySelectorAll('.score-btn').forEach((b, bi) => b.classList.toggle('on', bi + 1 === val));
};

window.editSetPassed = (val) => {
  _editPassed = val;
  document.getElementById('editPfPass').classList.toggle('on', val === true);
  document.getElementById('editPfFail').classList.toggle('on', val === false);
};

window.saveEvalEdit = async () => {
  if (!editingEvalId) return;
  if (_editPassed === null || _editPassed === undefined) { showToast('합격 여부를 선택해주세요'); return; }
  const comment = document.getElementById('editComment').value.trim();
  await update(ref(db, `academies/${academyId}/exam/evaluations/${editingEvalId}`), {
    scores:  _editScores,
    passed:  _editPassed,
    comment,
  });
  closeModal('modalEvalEdit');
  showToast('✅ 수정 완료');
};

window.imageCard = async (evalId) => {
  // academyName 강제 재조회 (카드 생성 시점에 항상 확인)
  if (!academyName && academyId) {
    const nameSnap = await get(ref(db, `academies/${academyId}/settings/academyName`));
    academyName = nameSnap.val() || '';
  }
  console.log('카드 생성 시 academyName:', academyName, 'academyId:', academyId);
  if (typeof html2canvas === 'undefined') {
    showToast('⚠️ 라이브러리 로딩 중, 잠시 후 다시 시도해주세요');
    return;
  }
  const e = evaluations[evalId];
  if (!e) { showToast('데이터를 찾을 수 없습니다'); return; }

  if (!academyName) {
    try {
      const nameSnap = await get(ref(db, `academies/${academyId}/settings/academyName`));
      academyName = nameSnap.val() || '';
    } catch(e) {}
  }

  const st    = students[e.studentId] || {};
  const name  = st.name || '-';
  const belt  = e.belt || '흰띠';
  const grade = e.grade || '';
  const sc    = e.scores || { poomsae:[], kick:[], extreme:[], character:[] };
  const crr   = BELT_CURRICULUM[belt] || BELT_CURRICULUM['흰띠'];

  // flat 평균 (2D 배열 대응)
  function flatAvg(arr) {
    const flat = (arr||[]).flat ? (arr||[]).flat(2) : (arr||[]);
    const valid = flat.map(Number).filter(v => v > 0);
    return valid.length ? valid.reduce((a,b)=>a+b,0)/valid.length : 0;
  }
  // flat 배열에서 j번째 값 (i는 curriculum item index, j는 sub-index)
  function gsv(arr, j) {
    if (!arr || !arr.length) return 0;
    const item = arr[0];
    if (Array.isArray(item)) return Number(item[j]) || 0;
    return Number(arr[j]) || 0;
  }

  const pAvg = flatAvg(sc.poomsae);
  const kAvg = flatAvg(sc.kick);
  const eAvg = flatAvg(sc.extreme);
  const cAvg = flatAvg(sc.character);
  const sectAvgs = [pAvg, kAvg, eAvg, cAvg].filter(v => v > 0);
  const oAvg = sectAvgs.length ? sectAvgs.reduce((a,b)=>a+b,0)/sectAvgs.length : 0;

  const passedText   = e.passed===true?'합격':e.passed===false?'불합격':'-';
  const passedColor  = e.passed===true?'#16a34a':e.passed===false?'#dc2626':'#6b7a8d';
  const passedBorder = e.passed===true?'#16a34a':e.passed===false?'#dc2626':'#9ca3af';
  const passedBg     = e.passed===true?'#dcfce7':e.passed===false?'#fee2e2':'#f1f5f9';

  const issueDate    = todayStr();

  // 띠 Pill 배지
  const PILL_BG = {
    '흰띠':'#e5e7eb','흰검띠':'#d1d5db',
    '노란띠':'#eab308','노검띠':'#ca8a04',
    '주황띠':'#f97316','주황검띠':'#ea580c',

    '1품단':'#1f2937','2품단':'#1f2937','3품단':'#111827','4품단':'#030712',

  const pillColor = new Set(['흰띠','흰검띠']).has(belt) ? '#374151' : '#ffffff';

    ? 'background:#dcfce7;color:#166534;border:1.5px solid #86efac'

    ? 'background:#fee2e2;color:#dc2626;border:1.5px solid #fca5a5'

    </div>`

  // 품새 섹션 (poomsae 항목별 정확도/완성도)
  let poomsaeRows = '';
  (crr.poomsae||[]).forEach(item => {

        <div>
          <div style="font-size:15px;font-weight:700;color:#1e293b">${academyName||''}</div>
          <div style="font-size:11px;color:#64748b;margin-top:4px">본 결과지는 공식 발행된 심사 평가 결과입니다.</div>
          ${academyPhone ? `<div style="font-size:11px;color:#64748b">문의: ☎ ${academyPhone}</div>` : ''}
        </div>
        <div style="text-align:right">
          <div style="width:80px;border-top:1px solid #cbd5e1"></div>
          <div style="font-size:11px;color:#64748b;margin-top:4px">담당 사범</div>
        </div>
      </div>
      <div style="height:6px;background:linear-gradient(to right,#60a5fa,#a78bfa,#f472b6);width:100%;display:block;"></div>
    </div>
  </div>`;

  const wrap = document.createElement('div');
  wrap.style.cssText = 'position:fixed;left:-9999px;top:0;width:390px';
  wrap.innerHTML = cardHtml;
  document.body.appendChild(wrap);

  const cv = document.getElementById(cvId);
  if (cv) drawRadarChart(cv, sc);

  showToast('🎨 카드 생성 중...');

  html2canvas(wrap.firstElementChild, {
    scale: 2,
    backgroundColor: '#ffffff',
    useCORS: true,
    logging: false,
  }).then(canvas => {
    document.body.removeChild(wrap);
    const link = document.createElement('a');
    link.download = name + '_승급심사_결과.jpg';
    link.href = canvas.toDataURL('image/jpeg', 0.95);
    link.click();
    showToast('✅ 결과 카드 저장 완료!');
  }).catch(err => {
    document.body.removeChild(wrap);
    console.error(err);
    showToast('⚠️ 카드 생성에 실패했습니다');
  });
};

function drawRadarChart(canvas, scores) {
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const cx = W/2, cy = H/2;
  const R = 70;
  const n = 4;
  const labels = ['품새','발차기','익스트림','인성'];
  const vals = [
    avgScoreNum(scores.poomsae),
    avgScoreNum(scores.kick),
    avgScoreNum(scores.extreme),
    avgScoreNum(scores.character),
  ];
  const angles = Array.from({length:n}, (_,i) => -Math.PI/2 + (2*Math.PI/n)*i);

  ctx.clearRect(0, 0, W, H);

  for (let r = 1; r <= 5; r++) {
    ctx.beginPath();
    for (let i = 0; i < n; i++) {
      const x = cx + (R*r/5)*Math.cos(angles[i]);
      const y = cy + (R*r/5)*Math.sin(angles[i]);
      i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
    }
    ctx.closePath();
    ctx.strokeStyle = r===5 ? '#cbd5e1' : '#e2e8f0';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  ctx.strokeStyle = '#e2e8f0';
  ctx.lineWidth = 1;
  angles.forEach(a => {
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx+R*Math.cos(a), cy+R*Math.sin(a));
    ctx.stroke();
  });

  ctx.beginPath();
  vals.forEach((v, i) => {
    const rv = (v/5)*R;
    const x = cx+rv*Math.cos(angles[i]);
    const y = cy+rv*Math.sin(angles[i]);
    i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
  });
  ctx.closePath();
  ctx.fillStyle = 'rgba(37,99,235,0.12)';
  ctx.fill();
  ctx.strokeStyle = '#2563eb';
  ctx.lineWidth = 2;
  ctx.stroke();

  vals.forEach((v, i) => {
    if (v > 0) {
      const rv = (v/5)*R;
      const x = cx+rv*Math.cos(angles[i]);
      const y = cy+rv*Math.sin(angles[i]);
      ctx.beginPath(); ctx.arc(x, y, 4, 0, Math.PI*2);
      ctx.fillStyle = '#2563eb'; ctx.fill();
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5; ctx.stroke();
    }
  });

  const lR = R+22;
  ctx.fillStyle = '#374151';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.font = 'bold 12px sans-serif';
  labels.forEach((lb, i) => {
    const x = cx+lR*Math.cos(angles[i]);
    const y = cy+lR*Math.sin(angles[i]);
    ctx.fillText(lb, x, y);
  });

  ctx.font = '10px sans-serif';
  ctx.fillStyle = '#2563eb';
  vals.forEach((v, i) => {
    if (v > 0) {
      const rv = (v/5)*R;
      const ox = Math.cos(angles[i])*13;
      const oy = Math.sin(angles[i])*13;
      ctx.fillText(v.toFixed(1), cx+rv*Math.cos(angles[i])+ox, cy+rv*Math.sin(angles[i])+oy);
    }
  });
}

window.deleteEvalRecord = async (evalId) => {
  if (!confirm('이 심사 기록을 삭제합니다. 되돌릴 수 없습니다. 계속할까요?')) return;
  await remove(ref(db, `academies/${academyId}/exam/evaluations/${evalId}`));
  showToast('🗑️ 삭제 완료');
};
