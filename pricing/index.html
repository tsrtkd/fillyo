<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>구독 플랜 선택 — FILLYO</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.iamport.kr/v1/iamport.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:#EEF2F8;color:#1A2332;min-height:100vh;-webkit-font-smoothing:antialiased}

/* ── HEADER ── */
.hdr{background:#1A2332;position:sticky;top:0;z-index:100}
.hdr-inner{display:flex;align-items:center;justify-content:space-between;height:60px;max-width:640px;margin:0 auto;padding:0 20px}
.logo{font-size:22px;font-weight:900;letter-spacing:3px;text-decoration:none;display:flex;align-items:center}
.logo-fill{color:#ffffff}
.logo-yo{color:#0B7B6B}
.logout-btn{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.7);padding:7px 14px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .2s}
.logout-btn:hover{background:rgba(255,255,255,0.18);color:#fff}

/* ── LOADING ── */
#loadingWrap{display:flex;align-items:center;justify-content:center;min-height:60vh}
.spinner{width:36px;height:36px;border:3px solid rgba(11,123,107,.2);border-top-color:#0B7B6B;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── MAIN ── */
#pageWrap{display:none}
main{max-width:640px;margin:0 auto;padding:28px 16px 80px}

/* ── PAGE TITLE ── */
.page-title{font-size:22px;font-weight:900;color:#1A2332;margin-bottom:6px}
.page-sub{font-size:14px;color:#5A6A7A;line-height:1.6;margin-bottom:28px}

/* ── PLAN CARDS ── */
.plan-card{background:#fff;border-radius:16px;box-shadow:0 2px 16px rgba(11,31,58,.08);padding:22px 24px;margin-bottom:14px;position:relative;overflow:hidden;cursor:pointer;transition:box-shadow .2s,transform .15s;border:2px solid transparent}
.plan-card:active{transform:scale(0.99)}
.plan-card.required{border-color:#0B7B6B;cursor:default}
.plan-card.required:active{transform:none}
.plan-card.selected{border-color:#0B7B6B;box-shadow:0 4px 20px rgba(11,123,107,.15)}
.card-top-bar{position:absolute;top:0;left:0;right:0;height:3px;background:#0B7B6B}

.card-row{display:flex;align-items:center;gap:14px}
.checkbox-wrap{flex-shrink:0}
.cb{width:22px;height:22px;border-radius:6px;border:2px solid #DDE4EE;background:#fff;display:flex;align-items:center;justify-content:center;transition:all .2s}
.cb.checked{background:#0B7B6B;border-color:#0B7B6B}
.cb.disabled:not(.checked){background:#f3f4f6;border-color:#DDE4EE;cursor:default}

.rb{width:22px;height:22px;border-radius:50%;border:2px solid #DDE4EE;background:#fff;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.rb.selected{border-color:#0B7B6B}
.rb.selected::after{content:'';width:10px;height:10px;border-radius:50%;background:#0B7B6B}
.cb svg{display:none}
.cb.checked svg{display:block}

.card-body{flex:1;min-width:0}
.card-name{font-size:16px;font-weight:900;color:#1A2332;margin-bottom:4px}
.card-badge{display:inline-block;background:#0B7B6B;color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;letter-spacing:.5px;margin-left:8px;vertical-align:middle}
.price-row{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap}
.price-regular{font-size:13px;color:#9ca3af;text-decoration:line-through}
.price-now{font-size:22px;font-weight:900;color:#0B7B6B}
.price-unit{font-size:13px;color:#6b7280}
.price-note{font-size:12px;color:#9ca3af;margin-top:4px}

/* ── BILLING TOGGLE ── */
.billing-toggle{display:flex;background:#fff;border-radius:12px;padding:4px;gap:4px;margin-bottom:24px;box-shadow:0 2px 8px rgba(11,31,58,.06)}
.billing-tab{flex:1;padding:10px 8px;border:none;border-radius:9px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;color:#5A6A7A;background:transparent;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:7px}
.billing-tab.active{background:#0B7B6B;color:#fff;box-shadow:0 2px 8px rgba(11,123,107,.25)}
.billing-badge{background:#F9A825;color:#1A2332;font-size:10px;font-weight:900;padding:2px 7px;border-radius:10px;letter-spacing:.3px;white-space:nowrap}
.billing-tab.active .billing-badge{background:#FFD54F}

/* ── SECTION LABEL ── */
.section-label{font-size:12px;font-weight:700;color:#0B7B6B;letter-spacing:1.2px;text-transform:uppercase;margin:24px 0 10px}

/* ── TOTAL BOX ── */
.total-box{background:#fff;border-radius:16px;box-shadow:0 2px 16px rgba(11,31,58,.08);padding:20px 24px;margin-top:24px;margin-bottom:20px}
.total-label{font-size:13px;color:#5A6A7A;margin-bottom:12px}
.total-items{margin-bottom:14px}
.total-item{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #f3f4f6;font-size:14px;color:#374151}
.total-item:last-child{border-bottom:none}
.total-item-name{color:#374151}
.total-item-price{font-weight:700;color:#1A2332}
.total-divider{height:1px;background:#DDE4EE;margin:4px 0 14px}
.total-final-row{display:flex;justify-content:space-between;align-items:center}
.total-final-label{font-size:15px;font-weight:700;color:#1A2332}
.total-final-price{font-size:26px;font-weight:900;color:#0B7B6B}
.total-final-unit{font-size:13px;font-weight:400;color:#6b7280}

/* ── PAY BUTTON ── */
.pay-btn{width:100%;background:#0B7B6B;color:#fff;border:none;border-radius:14px;padding:17px;font-size:17px;font-weight:900;cursor:pointer;font-family:inherit;letter-spacing:.3px;transition:all .2s;position:relative}
.pay-btn:hover{background:#085041;transform:translateY(-1px);box-shadow:0 6px 20px rgba(11,123,107,.3)}
.pay-btn:active{transform:translateY(0)}
.pay-btn:disabled{background:#9ca3af;cursor:not-allowed;transform:none;box-shadow:none}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#1A2332;color:#fff;padding:12px 20px;border-radius:10px;font-size:14px;font-weight:500;z-index:9999;opacity:0;transition:all .3s;white-space:nowrap;pointer-events:none;max-width:90vw;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.error{background:#C62828}
.toast.success{background:#0B7B6B}

/* ── FOOTER ── */
footer{background:#1A2332;text-align:center;padding:24px 6%;color:rgba(255,255,255,0.5);font-size:12px;line-height:2}

@media(max-width:480px){
  .plan-card{padding:18px}
  main{padding:20px 12px 80px}
}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-inner">
    <a class="logo" href="/"><span class="logo-fill">FILL</span><span class="logo-yo">YO</span></a>
    <button class="logout-btn" id="logoutBtn">로그아웃</button>
  </div>
</header>

<div id="loadingWrap"><div class="spinner"></div></div>

<div id="pageWrap">
  <main>
    <h1 class="page-title">구독 플랜 선택</h1>
    <p class="page-sub">업무일지를 중심으로 필요한 서비스를 추가하세요</p>

    <!-- 월결제/연결제 토글 -->
    <div class="billing-toggle">
      <button class="billing-tab active" id="tabMonthly" onclick="setBilling('monthly')">월결제</button>
      <button class="billing-tab" id="tabYearly" onclick="setBilling('yearly')">연결제 <span class="billing-badge">2개월 무료</span></button>
    </div>

    <div class="section-label">메인 플랜</div>

    <!-- 업무일지 얼리버드 -->
    <div class="plan-card selected" id="cardEarly" onclick="selectPlan('early')">
      <div class="card-top-bar"></div>
      <div class="card-row">
        <div class="checkbox-wrap">
          <div class="rb selected" id="rbEarly"></div>
        </div>
        <div class="card-body">
          <div class="card-name">업무일지<span class="card-badge">얼리버드</span></div>
          <div class="price-row">
            <span class="price-regular" id="earlyPriceRegular">₩19,800/월</span>
            <span class="price-now" id="earlyPriceNow">₩9,900</span>
            <span class="price-unit" id="earlyPriceUnit">/월</span>
          </div>
          <div class="price-note" id="earlyPriceNote">8/31까지 가입 시 1년간 고정</div>
        </div>
      </div>
    </div>

    <!-- 업무일지 정상가 -->
    <div class="plan-card" id="cardRegular" onclick="selectPlan('regular')">
      <div class="card-row">
        <div class="checkbox-wrap">
          <div class="rb" id="rbRegular"></div>
        </div>
        <div class="card-body">
          <div class="card-name">업무일지</div>
          <div class="price-row">
            <span class="price-now" id="regularPriceNow">₩19,800</span>
            <span class="price-unit" id="regularPriceUnit">/월</span>
          </div>
          <div class="price-note" id="regularPriceNote">가입 즉시 정상가 적용</div>
        </div>
      </div>
    </div>

    <div class="section-label" style="margin-top:20px">애드온 <span style="font-size:11px;font-weight:400;color:#9ca3af;letter-spacing:0;text-transform:none">— 선택 추가</span></div>

    <!-- 승급심사 -->
    <div class="plan-card" id="cardExam" onclick="toggleAddon('exam')">
      <div class="card-row">
        <div class="checkbox-wrap">
          <div class="cb" id="cbExam">
            <svg width="13" height="10" viewBox="0 0 13 10" fill="none">
              <path d="M1.5 5L5 8.5L11.5 1.5" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
        </div>
        <div class="card-body">
          <div class="card-name">승급심사</div>
          <div class="price-row">
            <span class="price-now" style="font-size:18px" id="priceExam">₩4,900</span>
            <span class="price-unit" id="unitExam">/월</span>
          </div>
        </div>
      </div>
    </div>

    <!-- 줄넘기 -->
    <div class="plan-card" id="cardJump" onclick="toggleAddon('jumprope')">
      <div class="card-row">
        <div class="checkbox-wrap">
          <div class="cb" id="cbJumprope">
            <svg width="13" height="10" viewBox="0 0 13 10" fill="none">
              <path d="M1.5 5L5 8.5L11.5 1.5" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
        </div>
        <div class="card-body">
          <div class="card-name">줄넘기</div>
          <div class="price-row">
            <span class="price-now" style="font-size:18px" id="priceJump">₩4,900</span>
            <span class="price-unit" id="unitJump">/월</span>
          </div>
        </div>
      </div>
    </div>

    <!-- AI 성장리포트 -->
    <div class="plan-card" id="cardReport" onclick="toggleAddon('report')">
      <div class="card-row">
        <div class="checkbox-wrap">
          <div class="cb" id="cbReport">
            <svg width="13" height="10" viewBox="0 0 13 10" fill="none">
              <path d="M1.5 5L5 8.5L11.5 1.5" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
        </div>
        <div class="card-body">
          <div class="card-name">AI 성장리포트</div>
          <div class="price-row">
            <span class="price-now" style="font-size:18px" id="priceReport">₩4,900</span>
            <span class="price-unit" id="unitReport">/월</span>
          </div>
          <div class="price-note">학생 100명 이하 기준</div>
        </div>
      </div>
    </div>

    <!-- 합계 -->
    <div class="total-box">
      <div class="total-label">선택 항목</div>
      <div class="total-items" id="totalItems"></div>
      <div class="total-divider"></div>
      <div class="total-final-row">
        <span class="total-final-label" id="totalFinalLabel">월 결제 금액</span>
        <span class="total-final-price" id="totalPrice">₩9,900<span class="total-final-unit">/월</span></span>
      </div>
    </div>

    <button class="pay-btn" id="payBtn" onclick="startPayment()">결제하기</button>
  </main>
</div>

<footer>
  <a href="/terms/" style="color:rgba(255,255,255,.45);text-decoration:none">이용약관</a> &nbsp;·&nbsp;
  <a href="/privacy/" style="color:rgba(255,255,255,.45);text-decoration:none">개인정보처리방침</a> &nbsp;·&nbsp;
  <a href="/refund/" style="color:rgba(255,255,255,.45);text-decoration:none">환불정책</a><br>
  © 2026 FILLYO · fillyo.kr
</footer>

<div class="toast" id="toast"></div>


<script type="module">
import { initializeApp }   from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getDatabase, ref, get, update }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const FB_CONFIG = {
  apiKey:            "AIzaSyBL5lQr2VIPK9caokm90g4_eQIkA8EXjqE",
  authDomain:        "fillyo-journal.firebaseapp.com",
  projectId:         "fillyo-journal",
  storageBucket:     "fillyo-journal.firebasestorage.app",
  messagingSenderId: "594047356761",
  appId:             "1:594047356761:web:bfd402441d83eedf63c648",
  databaseURL:       "https://fillyo-journal-default-rtdb.asia-southeast1.firebasedatabase.app",
};

const app  = initializeApp(FB_CONFIG);
const auth = getAuth(app);
const db   = getDatabase(app);

let currentUser = null;

onAuthStateChanged(auth, user => {
  if (!user) {
    location.href = '/login/';
    return;
  }
  currentUser = user;
  document.getElementById('loadingWrap').style.display = 'none';
  document.getElementById('pageWrap').style.display = 'block';
});

document.getElementById('logoutBtn').addEventListener('click', () => {
  signOut(auth).then(() => { location.href = '/login/'; });
});

// ── 메인 플랜 선택 ──
const PLAN_PRICES = { early: 9900, regular: 19800 };
let selectedPlan  = 'early';

window.selectPlan = function(plan) {
  selectedPlan = plan;
  document.getElementById('cardEarly').classList.toggle('selected', plan === 'early');
  document.getElementById('cardRegular').classList.toggle('selected', plan === 'regular');
  document.getElementById('rbEarly').classList.toggle('selected', plan === 'early');
  document.getElementById('rbRegular').classList.toggle('selected', plan === 'regular');
  renderTotal();
};

// ── 결제 주기 ──
let billingCycle = 'monthly';

window.setBilling = function(cycle) {
  billingCycle = cycle;
  document.getElementById('tabMonthly').classList.toggle('active', cycle === 'monthly');
  document.getElementById('tabYearly').classList.toggle('active', cycle === 'yearly');
  updateCardPrices();
  renderTotal();
};

function updateCardPrices() {
  const y = billingCycle === 'yearly';
  // 얼리버드 카드
  document.getElementById('earlyPriceRegular').textContent = y ? '₩237,600/년' : '₩19,800/월';
  document.getElementById('earlyPriceNow').textContent     = y ? '₩99,000'     : '₩9,900';
  document.getElementById('earlyPriceUnit').textContent    = y ? '/년'          : '/월';
  document.getElementById('earlyPriceNote').textContent    = y ? '8/31까지 가입 · 월 ₩8,250 · 연 ₩138,600 절약' : '8/31까지 가입 시 1년간 고정';
  // 정상가 카드
  document.getElementById('regularPriceNow').textContent   = y ? '₩198,000'    : '₩19,800';
  document.getElementById('regularPriceUnit').textContent  = y ? '/년'          : '/월';
  document.getElementById('regularPriceNote').textContent  = y ? '가입 즉시 정상가 적용 · 월 ₩16,500' : '가입 즉시 정상가 적용';
  // 애드온 카드
  ['Exam','Jump','Report'].forEach(k => {
    document.getElementById('price' + k).textContent = y ? '₩49,000' : '₩4,900';
    document.getElementById('unit'  + k).textContent = y ? '/년'      : '/월';
  });
  // 합계 레이블
  document.getElementById('totalFinalLabel').textContent = y ? '연 결제 금액' : '월 결제 금액';
}

// ── 애드온 상태 ──
const addons = { exam: false, jumprope: false, report: false };

window.toggleAddon = function(key) {
  addons[key] = !addons[key];
  const cb    = document.getElementById('cb' + key.charAt(0).toUpperCase() + key.slice(1));
  const card  = { exam: 'cardExam', jumprope: 'cardJump', report: 'cardReport' }[key];
  if (addons[key]) {
    cb.classList.add('checked');
    document.getElementById(card).classList.add('selected');
  } else {
    cb.classList.remove('checked');
    document.getElementById(card).classList.remove('selected');
  }
  renderTotal();
};

// ── 합계 렌더링 ──
const PRICES = { main: 9900, exam: 4900, jumprope: 4900, report: 4900 };
const NAMES  = { main: '업무일지', exam: '승급심사', jumprope: '줄넘기', report: 'AI 성장리포트' };

function renderTotal() {
  const y          = billingCycle === 'yearly';
  const mul        = y ? 10 : 1;
  const unit       = y ? '/년' : '/월';
  const mainPrice  = PLAN_PRICES[selectedPlan] * mul;
  const mainName   = selectedPlan === 'early' ? `업무일지 (얼리버드${y ? ', 연결제' : ''})` : `업무일지${y ? ' (연결제)' : ''}`;
  const items      = [{ name: mainName, price: mainPrice }];
  let total        = mainPrice;
  Object.keys(addons).forEach(k => {
    if (addons[k]) {
      const p = PRICES[k] * mul;
      items.push({ name: NAMES[k], price: p });
      total += p;
    }
  });

  const el = document.getElementById('totalItems');
  el.innerHTML = items.map(i =>
    `<div class="total-item"><span class="total-item-name">${i.name}</span><span class="total-item-price">₩${i.price.toLocaleString()}</span></div>`
  ).join('');

  document.getElementById('totalPrice').innerHTML =
    `₩${total.toLocaleString()}<span class="total-final-unit">${unit}</span>`;
}
renderTotal();

// ── 결제 ──
window.startPayment = async function() {
  const user = auth.currentUser;
  if (!user) { showToast('로그인이 필요합니다.', 'error'); return; }

  const mul   = billingCycle === 'yearly' ? 10 : 1;
  const total = PLAN_PRICES[selectedPlan] * mul + Object.keys(addons).reduce((s, k) => s + (addons[k] ? PRICES[k] * mul : 0), 0);
  const parts = ['업무일지'];
  if (addons.exam)     parts.push('승급심사');
  if (addons.jumprope) parts.push('줄넘기');
  if (addons.report)   parts.push('AI 성장리포트');
  const planName = 'FILLYO ' + parts.join('+');

  const btn = document.getElementById('payBtn');
  btn.disabled = true;
  btn.textContent = '결제창 열기...';

  const snap = await get(ref(db, 'users/' + user.uid));
  const userData = snap.exists() ? snap.val() : {};

  IMP.init('store-0e6ce5fc-6728-436c-8ca5-bb0ba0e6ba4c');
  IMP.request_pay({
    storeId:     'store-0e6ce5fc-6728-436c-8ca5-bb0ba0e6ba4c',
    channelKey:  'channel-key-7e35243f-0b8d-4ff8-9f92-014204dafd2e',
    pay_method:  'card',
    merchant_uid: 'fillyo_' + Date.now(),
    name:         planName,
    amount:       total,
    buyer_email:  user.email || '',
    buyer_name:   userData.name || user.email || 'FILLYO 사용자',
    buyer_tel:    userData.phone || '010-0000-0000',
  }, async rsp => {
    if (rsp.success) {
      try {
        await update(ref(db, 'users/' + user.uid), {
          planType:      'pro',
          billingCycle:  billingCycle,
          planExpiry:    Date.now() + (billingCycle === 'yearly' ? 365 : 30) * 24 * 60 * 60 * 1000,
          subscribedAddons: {
            exam:      !!addons.exam,
            jumprope:  !!addons.jumprope,
            report:    !!addons.report,
          },
          lastPayment: {
            amount:       total,
            date:         Date.now(),
            merchant_uid: rsp.merchant_uid,
          },
        });
        location.href = '/dashboard';
      } catch(e) {
        showToast('결제는 완료됐으나 저장 중 오류가 발생했습니다.', 'error');
        btn.disabled = false;
        btn.textContent = '결제하기';
      }
    } else {
      showToast('결제 실패: ' + (rsp.error_msg || '알 수 없는 오류'), 'error');
      btn.disabled = false;
      btn.textContent = '결제하기';
    }
  });
};

// ── 토스트 ──
window.showToast = function(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className   = 'toast' + (type ? ' ' + type : '');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3500);
};
</script>
</body>
